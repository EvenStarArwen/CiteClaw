# CiteClaw configuration — RNA Foundation Models citation network
# =================================================================
# Builds a seeds-only citation graph over the 73 papers curated in
# https://github.com/COLA-Laboratory/Awesome-RNA-Foundation-Models
#
# "Seeds-only" trick: CiteClaw doesn't natively support trimming a
# citation network to a fixed node set, so we run the normal
# ExpandForward / ExpandBackward loops but gate them behind a
# CitationFilter with an impossibly high beta (1_000_000). Every
# candidate fetched from S2 fails that filter and gets dropped, so
# ctx.collection stays equal to the seeds the whole run.
#
# What still happens during the run:
#   * LoadSeeds  — metadata for every seed is fetched + cached.
#   * ExpandForward / ExpandBackward — for every seed, citers +
#     references are fetched (source_refs are grabbed before the
#     screener runs), populating the S2 cache.
#   * Finalize — enriches any still-missing reference lists, fetches
#     SPECTER2 embeddings in one batch, and writes the graph.
#
# The resulting citation_network.graphml contains ONE node per seed
# and edges only among seeds, with per-edge weights computed as the
# max of ref_similarity / cit_similarity / semantic_similarity
# (see src/citeclaw/output/graphml_writer.py).
#
# Run:
#   python -m citeclaw -c config_rna.yaml
#   python annotate_graph.py data_rna/citation_network.graphml \
#       -c config_rna.yaml \
#       --use-title --use-abstract --use-full-text \
#       -i "1-word model / benchmark name (e.g., RNA-FM, Evo2, RNAGym)"
#
# Env vars (keys are NEVER read from this file):
#   export GEMINI_API_KEY=...
#   export S2_API_KEY=...          # or SEMANTIC_SCHOLAR_API_KEY

screening_model: "gemini-3.1-flash-lite-preview"
reasoning_effort: "minimal"

data_dir: "data_rna"
topic_description: >
  RNA foundation models — pre-trained language / deep-learning models for
  non-coding RNA, mRNA / CDS, UTR, structure-aware RNA, RNA generation,
  DNA+RNA multi-modal sequences, and related RNA benchmarks / surveys.

# Soft cap; the seeds-only screener keeps the true collection at 73.
max_papers_total: 200
llm_batch_size: 10
llm_concurrency: 16
s2_requests_per_second: 0.9
max_llm_tokens: 5000000
max_s2_requests: 10000

graph_label_instruction: >
  Read the paper's title and abstract (and full text, if provided).
  Output the canonical short name of the primary RNA / nucleic-acid
  foundation model, benchmark, or software platform the paper
  introduces (e.g., RNA-FM, RNAErnie, RiNALMo, UTR-LM, Evo2, RNAGym,
  BEACON). Output "survey" if the paper is a survey / review. If the
  paper does not introduce a named artifact, output an empty string.
  Do not invent names.

# =================================================================
# BLOCKS
# =================================================================
blocks:
  # "Kill-all" filter: threshold = years_since_publication * 1_000_000,
  # so no real paper ever clears it. Used only to drop every expansion
  # candidate so the final collection stays equal to the seed set.
  seeds_only:
    type: CitationFilter
    beta: 1000000

# =================================================================
# PIPELINE
# =================================================================
# ResolveSeeds handles the 6 seeds that are listed by title only
# (openreview / academic.oup / aclanthology URLs don't carry a clean
# DOI). ExpandForward + ExpandBackward populate each seed's refs /
# citers in the S2 cache; the kill-all filter drops everything they
# find. Finalize enriches missing refs, pulls SPECTER2 embeddings,
# and writes the graph.
pipeline:
  - step: ResolveSeeds

  - step: LoadSeeds

  - step: ExpandForward
    max_citations: 100
    screener: seeds_only

  - step: ExpandBackward
    screener: seeds_only

  - step: Finalize

# =================================================================
# SEED PAPERS — 73 entries from Awesome-RNA-Foundation-Models
