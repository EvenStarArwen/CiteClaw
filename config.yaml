# CiteClaw configuration — public template
# Run: python -m citeclaw -c config.yaml
#
# API keys are NOT read from this file. Export them as environment variables:
#   export OPENAI_API_KEY=...
#   export GEMINI_API_KEY=...
#   export S2_API_KEY=...          # or SEMANTIC_SCHOLAR_API_KEY
#
# This is a worked example for a biology / ML survey. Replace the topic
# description, seed papers, and screening prompts with your own to
# adapt CiteClaw to a different domain.

screening_model: "gemini-3.1-flash-lite-preview"
reasoning_effort: "minimal"

data_dir: "data"
topic_description: >
  Machine learning, deep learning, language models, and foundation models developed specifically for biology
  (e.g., DNA, RNA/protein sequence/structure data, as well as genomic, transcriptomic, or single-cell omics data),
  or benchmark/survey papers on these topics.

# Seed papers can be specified as DOIs (resolved via S2) or as titles
# (resolved via S2 search_match by the ResolveSeeds step).
seed_papers:
  - paper_id: "DOI:10.48550/arXiv.2306.15794"         # HyenaDNA
  - paper_id: "DOI:10.48550/arXiv.2206.13517"         # ProGen2
  - paper_id: "DOI:10.1101/2023.12.07.570727"         # ProteinGym

max_papers_total: 2000
llm_batch_size: 10
llm_concurrency: 16
s2_requests_per_second: 0.9
max_llm_tokens: 50000000
max_s2_requests: 100000

graph_label_instruction: >
  Read the abstract of the following paper. Try to find the name of the
  primary ML model (e.g., AlphaFold3), software platform, or dataset/benchmark
  introduced in the paper and output it. If the authors do not explicitly
  mention the method's name, output empty string. Output "survey" if the paper
  is a survey/review. Do not invent names.

# =================================================================
# MODELS REGISTRY (optional — uncomment to enable multi-provider)
# =================================================================
# Each entry maps a YAML alias to an OpenAI-compatible endpoint plus the
# provider-specific reasoning_parser. A block's ``model:`` field picks an
# alias; the factory routes through the corresponding endpoint. Any alias
# not in the registry falls through to legacy routing (Gemini auto-detect,
# llm_base_url, OpenAI SaaS) so plain configs keep working unchanged.
#
# API keys come from environment variables only — the ``api_key_env`` field
# names the variable to read; the key itself never appears in YAML.
#
# reasoning_parser dispatch:
#   ""/vllm/gemma4/qwen3/deepseek_r1 → vLLM chat_template_kwargs shape
#   openai/grok/xai/mistral/magistral → native reasoning_effort kwarg
#   none/off → no reasoning kwargs (for providers/models without reasoning)
#
# models:
#   # Self-hosted vLLM (Modal Gemma). Default ``screening_model`` target.
#   gemma-4-31b:
#     base_url: "https://you--citeclaw-vllm-gemma-serve.modal.run/v1"
#     served_model_name: "google/gemma-4-31B-it"
#     api_key_env: "CITECLAW_VLLM_API_KEY"
#     reasoning_parser: "gemma4"
#     thinking_budget: 12288
#
#   # xAI Grok — OpenAI-compatible, native reasoning_effort.
#   grok-4:
#     base_url: "https://api.x.ai/v1"
#     served_model_name: "grok-4"
#     api_key_env: "XAI_API_KEY"
#     reasoning_parser: "grok"
#
#   # Together AI — OpenAI-compatible; most hosted models have no reasoning.
#   together-llama-70b:
#     base_url: "https://api.together.xyz/v1"
#     served_model_name: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
#     api_key_env: "TOGETHER_API_KEY"
#     reasoning_parser: "none"
#
#   # Together AI with a reasoning model (DeepSeek-R1 via OpenAI-compat).
#   together-deepseek-r1:
#     base_url: "https://api.together.xyz/v1"
#     served_model_name: "deepseek-ai/DeepSeek-R1"
#     api_key_env: "TOGETHER_API_KEY"
#     reasoning_parser: "openai"   # Together exposes reasoning_effort natively
#
#   # Mistral — OpenAI-compatible at /v1. Use "magistral" parser for
#   # Mistral's reasoning models, "none" for plain chat models.
#   mistral-large:
#     base_url: "https://api.mistral.ai/v1"
#     served_model_name: "mistral-large-latest"
#     api_key_env: "MISTRAL_API_KEY"
#     reasoning_parser: "none"
#
#   magistral-medium:
#     base_url: "https://api.mistral.ai/v1"
#     served_model_name: "magistral-medium-latest"
#     api_key_env: "MISTRAL_API_KEY"
#     reasoning_parser: "magistral"

# =================================================================
# BLOCKS
# =================================================================
blocks:
  year_layer:    {type: YearFilter, min: 2017, max: 2025}
  cit_base:      {type: CitationFilter, beta: 30}
  cit_strict:    {type: CitationFilter, beta: 60}

  similarity:
    type: SimilarityFilter
    threshold: 0.025
    on_no_data: pass        # default; spelled explicitly for clarity
    measures:
      - {type: RefSim}
      - {type: CitSim, pass_if_cited_at_least: 200}
      - {type: SemanticSim, embedder: s2}   # uses S2's SPECTER2 embeddings

  title_llm:
    type: LLMFilter
    scope: title
    formula: "(q_ai | q_benchmark | q_software | q_survey) & q_biology"
    queries:
      q_ai:        "the paper develops/proposes NEW ML/DL/language/foundation models in biology"
      q_benchmark: "the paper evaluates/benchmarks NEW ML/DL/language/foundation models in biology"
      q_software:  "the paper develops/introduces NEW software platform for ML/DL/language/foundation models in biology"
      q_survey:    "the paper is a survey/review of ML/DL/language/foundation models in biology"
      q_biology:   "the data the paper considers is about DNA/RNA/protein sequence/structure"

  abstract_llm:
    type: LLMFilter
    scope: title_abstract
    prompt: "the paper develops a NEW ML/DL/foundation model, benchmark, or software platform"

  not_pure_app:
    type: Not
    layer:
      type: LLMFilter
      scope: title_abstract
      prompt: "the paper is purely an application of existing models without any methodological contribution"

  tiered_cit:
    type: Route
    routes:
      - if: {venue_in: ["arXiv", "bioRxiv", "medRxiv"]}
        pass_to: cit_strict
      - default: cit_base

  forward_screener:
    type: Sequential
    layers: [year_layer, tiered_cit, similarity, title_llm, abstract_llm, not_pure_app]

  backward_loose:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm]

  backward_strict:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm, abstract_llm, not_pure_app]

# =================================================================
# PIPELINE
# =================================================================
pipeline:
  - step: LoadSeeds

  - step: ExpandForward
    max_citations: 200
    screener: forward_screener

  - step: ExpandBackward
    screener: backward_strict

  - step: Rerank
    metric: citation
    k: 100

  - step: Parallel
    branches:
      - - step: Rerank
          metric: pagerank
          k: 10
          diversity:
            type: walktrap
            n_communities: 3
        - step: ExpandForward
          max_citations: 200
          screener: forward_screener
      - - step: ExpandBackward
          screener: backward_strict

  - step: Finalize
