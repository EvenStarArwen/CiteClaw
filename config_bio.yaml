# CiteClaw configuration — ML/DL/LM/FM for DNA/RNA/Protein survey
# Run: python -m citeclaw -c config_bio.yaml
#
# API keys are NOT read from this file. Export them as environment variables:
#   export OPENAI_API_KEY=...
#   export GEMINI_API_KEY=...
#   export S2_API_KEY=...          # or SEMANTIC_SCHOLAR_API_KEY

screening_model: "gemini-3.1-flash-lite-preview"
reasoning_effort: "minimal"

data_dir: "data_bio"
topic_description: >
  Machine learning, deep learning, language models, and foundation models developed specifically for biology 
  (e.g., DNA, RNA/protein sequence/structure data, as well as genomic, transcriptomic, or single-cell omics data),
  or benchmark/survey papers on these topics.

seed_papers:
  # - paper_id: "DOI:10.1038/s41586-026-10176-5"        # Evo2
  # - paper_id: "DOI:10.1038/s41592-024-02523-z"        # NT
  - paper_id: "DOI:10.48550/arXiv.2306.15794"         # HyenaDNA
  - paper_id: "DOI:10.48550/arXiv.2206.13517"         # ProGen2
  # - paper_id: "DOI:10.1038/s42256-024-00836-4"        # RNAErine
  # - paper_id: "DOI:10.1126/science.ade2574"           # ESM
  - paper_id: "DOI:10.1101/2023.12.07.570727"         # ProteinGym
  # - paper_id: "DOI:10.1101/2025.06.16.660049"         # RNAGym

max_papers_total: 2000
llm_batch_size: 10
llm_concurrency: 16
s2_requests_per_second: 0.9
max_llm_tokens: 50000000
max_s2_requests: 100000

graph_label_instruction: >
  Read the abstract of the following paper. Try to find the name of the
  primary ML model (e.g., AlphaFold3), software platform, or dataset/benchmark
  introduced in the paper and output it. If the authors do not explicitly
  mention the method's name, output empty string. Output "survey" if the paper
  is a survey/review. Do not invent names.

# =================================================================
# BLOCKS
# =================================================================
blocks:
  year_layer:    {type: YearFilter, min: 2017, max: 2025}
  cit_base:      {type: CitationFilter, beta: 30}
  cit_strict:    {type: CitationFilter, beta: 60}

  similarity:
    type: SimilarityFilter
    threshold: 0.025
    on_no_data: pass        # default; spelled explicitly for clarity
    measures:
      - {type: RefSim}
      - {type: CitSim, pass_if_cited_at_least: 200}
      - {type: SemanticSim, embedder: s2}   # uses S2's SPECTER2 embeddings

  title_llm:
    type: LLMFilter
    scope: title
    formula: "(q_ai | q_benchmark | q_software | q_survey) & q_biology"
    queries:
      q_ai:        "the paper develops/proposes NEW ML/DL/language/foundation models in biology"
      q_benchmark: "the paper evaluates/benchmarks NEW ML/DL/language/foundation models in biology"
      q_software:  "the paper develops/introduces NEW software platform for ML/DL/language/foundation models in biology"
      q_survey:    "the paper is a survey/review of ML/DL/language/foundation models in biology"
      q_biology:   "the data the paper considers is about DNA/RNA/protein sequence/structure"

  abstract_llm:
    type: LLMFilter
    scope: title_abstract
    prompt: "the paper develops a NEW ML/DL/foundation model, benchmark, or software platform"

  not_pure_app:
    type: Not
    layer:
      type: LLMFilter
      scope: title_abstract
      prompt: "the paper is purely an application of existing models without any methodological contribution"

  tiered_cit:
    type: Route
    routes:
      - if: {venue_in: ["arXiv", "bioRxiv", "medRxiv"]}
        pass_to: cit_strict
      - default: cit_base

  forward_screener:
    type: Sequential
    layers: [year_layer, tiered_cit, similarity, title_llm, abstract_llm, not_pure_app]

  backward_loose:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm]

  backward_strict:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm, abstract_llm, not_pure_app]

# =================================================================
# PIPELINE
# =================================================================
pipeline:
  - step: LoadSeeds

  - step: ExpandForward
    max_citations: 200
    screener: forward_screener

  - step: ExpandBackward
    screener: backward_strict

  - step: Rerank
    metric: citation
    k: 100

  - step: Parallel
    branches:
      - - step: Rerank
          metric: pagerank
          k: 10
          diversity:
            type: walktrap     
            n_communities: 3
        - step: ExpandForward
          max_citations: 200
          screener: forward_screener
      - - step: ExpandBackward
          screener: backward_strict

  - step: Finalize
