# CiteClaw configuration — full ExpandBy* family demo (PC-07)
#
# Demonstrates the composable Phase B/C expansion family layered on top
# of the same screener blocks used in config_bio.yaml. **The thesis: every
# new expand step reuses an existing screener — no new screening rules
# invented for ExpandBySearch / ExpandBySemantics / ExpandByAuthor.**
#
# Run: python -m citeclaw -c config_bio_with_expansion.yaml
#
# API keys are NOT read from this file. Export them as environment variables:
#   export OPENAI_API_KEY=...
#   export GEMINI_API_KEY=...
#   export S2_API_KEY=...          # or SEMANTIC_SCHOLAR_API_KEY

# =================================================================
# GLOBALS
# =================================================================
screening_model: "gemini-3.1-flash-lite-preview"
# PC-06: dedicated model for the iterative meta-LLM search agent. When
# unset, the agent inherits ``screening_model`` — set this to a more
# capable model when you want screening to stay cheap but the search
# agent to think harder.
search_model: "gemini-3-pro"
reasoning_effort: "high"

data_dir: "data_bio_expansion"
topic_description: >
  Machine learning, deep learning, language models, and foundation models developed specifically for biology
  (e.g., DNA, RNA/protein sequence/structure data, as well as genomic, transcriptomic, or single-cell omics data),
  or benchmark/survey papers on these topics.

# PC-04: ``seed_papers`` now mixes ``{title: ...}`` and ``{paper_id: ...}``
# entries. Title-only entries get resolved to canonical S2 paperIds via
# ``s2.search_match`` by the ResolveSeeds step before LoadSeeds runs.
seed_papers:
  - title: "Highly accurate protein structure prediction with AlphaFold"
  - title: "HyenaDNA: Long-Range Genomic Sequence Modeling at Single Nucleotide Resolution"
  - paper_id: "DOI:10.48550/arXiv.2206.13517"           # ProGen2

max_papers_total: 2000
llm_batch_size: 10
llm_concurrency: 16
s2_requests_per_second: 0.9
max_llm_tokens: 50000000
max_s2_requests: 100000

# =================================================================
# BLOCKS — copied verbatim from config_bio.yaml
# =================================================================
# Every new ExpandBy* step in the pipeline below reuses one of the
# screeners defined here (forward_screener / backward_strict /
# backward_loose). No new screening rules are introduced for the
# expansion family — that's the whole point of the composable design.
blocks:
  year_layer:    {type: YearFilter, min: 2017, max: 2025}
  cit_base:      {type: CitationFilter, beta: 30}
  cit_strict:    {type: CitationFilter, beta: 60}

  similarity:
    type: SimilarityFilter
    threshold: 0.025
    on_no_data: pass        # default; spelled explicitly for clarity
    measures:
      - {type: RefSim}
      - {type: CitSim, pass_if_cited_at_least: 200}
      - {type: SemanticSim, embedder: s2}   # uses S2's SPECTER2 embeddings

  title_llm:
    type: LLMFilter
    scope: title
    formula: "(q_ai | q_benchmark | q_software | q_survey) & q_biology"
    queries:
      q_ai:        "the paper develops/proposes NEW ML/DL/language/foundation models in biology"
      q_benchmark: "the paper evaluates/benchmarks NEW ML/DL/language/foundation models in biology"
      q_software:  "the paper develops/introduces NEW software platform for ML/DL/language/foundation models in biology"
      q_survey:    "the paper is a survey/review of ML/DL/language/foundation models in biology"
      q_biology:   "the data the paper considers is about DNA/RNA/protein sequence/structure"

  abstract_llm:
    type: LLMFilter
    scope: title_abstract
    prompt: "the paper develops a NEW ML/DL/foundation model, benchmark, or software platform"

  not_pure_app:
    type: Not
    layer:
      type: LLMFilter
      scope: title_abstract
      prompt: "the paper is purely an application of existing models without any methodological contribution"

  tiered_cit:
    type: Route
    routes:
      - if: {venue_in: ["arXiv", "bioRxiv", "medRxiv"]}
        pass_to: cit_strict
      - default: cit_base

  forward_screener:
    type: Sequential
    layers: [year_layer, tiered_cit, similarity, title_llm, abstract_llm, not_pure_app]

  backward_loose:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm]

  backward_strict:
    type: Sequential
    layers: [year_layer, tiered_cit, title_llm, abstract_llm, not_pure_app]

# =================================================================
# PIPELINE — full ExpandBy* family demo
# =================================================================
pipeline:
  # PC-04: walk title-only seeds + preprint/published external_ids.
  - step: ResolveSeeds
    include_siblings: true

  # LoadSeeds prefers ctx.resolved_seed_ids when ResolveSeeds ran first.
  - step: LoadSeeds

  # Citation-graph expansion via the existing screener blocks.
  - step: ExpandForward
    max_citations: 100
    screener: forward_screener

  - step: ExpandBackward
    screener: backward_strict

  # Rerank with diversity → picks 10 spread-out anchors for the LLM
  # search agent so it doesn't all-in on a single subtopic.
  - step: Rerank
    metric: pagerank
    k: 10
    diversity:
      type: walktrap
      n_communities: 3

  # Phase B/C flagship: iterative meta-LLM search agent.
  - step: ExpandBySearch
    agent:
      max_iterations: 4
      target_count: 150
      reasoning_effort: high
    screener: forward_screener

  # SPECTER2 nearest-neighbour expansion via S2 Recommendations API.
  # Zero LLM tokens, anchored on the same diverse Rerank output.
  - step: ExpandBySemantics
    max_anchor_papers: 10
    limit: 100
    screener: forward_screener

  # Author-graph traversal — top-K authors by h-index, then each one's
  # recent papers funnelled through the loose backward screener.
  - step: ExpandByAuthor
    top_k_authors: 10
    author_metric: h_index
    papers_per_author: 30
    screener: backward_loose

  # PD-01: ReinforceGraph lands here when implemented. Suggested shape:
  #   - step: ReinforceGraph
  #       metric: pagerank
  #       top_n: 30
  #       screener: backward_loose

  # Collapse preprint↔published pairs introduced by ResolveSeeds
  # (and any duplicates the agent surfaced).
  - step: MergeDuplicates

  - step: Rerank
    metric: citation
    k: 200

  - step: Finalize
