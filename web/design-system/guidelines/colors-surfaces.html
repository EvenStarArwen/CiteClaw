<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces — elevation ladder" subtitle="Recessed canvas → panels → raised cream cards" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;font-family:var(--cc-font-sans);color:var(--cc-ink-1);}
  body{padding:18px 20px;background:var(--cc-panel);}
  .sw{border-radius:8px;border:1px solid var(--cc-rule-strong);}
  .lbl{font-family:var(--cc-font-mono);font-size:10px;color:var(--cc-ink-3);margin-top:6px;}
  .val{font-family:var(--cc-font-mono);font-size:9px;color:var(--cc-ink-faint);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .cell{display:flex;flex-direction:column;}
</style></head><body><div class="row">
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-bg);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">bg / canvas</div><div class="val">#edeae1</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-panel);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">panel</div><div class="val">#f6f3ea</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-chrome);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">chrome</div><div class="val">#f8f5ee</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-card);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">card</div><div class="val">#fdfbf6</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-hover-soft);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">hover-soft</div><div class="val">#f7f3e8</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-hover-deep);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">hover-deep</div><div class="val">#e6e1d2</div></div>
</div></body></html>
