<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;font-family:var(--cc-font-sans);color:var(--cc-ink-1);}
  body{padding:18px 20px;background:var(--cc-panel);}
  .sw{border-radius:8px;border:1px solid var(--cc-rule-strong);}
  .lbl{font-family:var(--cc-font-mono);font-size:10px;color:var(--cc-ink-3);margin-top:6px;}
  .val{font-family:var(--cc-font-mono);font-size:9px;color:var(--cc-ink-faint);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .cell{display:flex;flex-direction:column;}
</style></head><body><div class="row" style="gap:18px;align-items:flex-end;">
  <div class="cell"><div style="width:150px;padding:11px;background:var(--cc-card);border:1px solid var(--cc-rule);border-radius:9px;box-shadow:var(--cc-shadow-2);font-size:13px;color:var(--cc-ink-1);">Resting card</div><div class="lbl">default</div></div>
  <div class="cell"><div style="width:150px;padding:11px;background:var(--cc-hover-soft);border:1px solid var(--cc-rule-strong);border-radius:9px;font-size:13px;color:var(--cc-ink-1);">Hovered</div><div class="lbl">hover</div></div>
  <div class="cell"><div style="width:150px;padding:11px;background:var(--cc-card);border:1px solid var(--cc-accent);border-radius:9px;box-shadow:var(--cc-ring);font-size:13px;color:var(--cc-ink-1);">Selected</div><div class="lbl">selection · green ring</div></div>
</div></body></html>
