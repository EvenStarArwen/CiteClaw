<!-- @dsCard group="Colors" viewport="700x180" name="Accent — forest green" subtitle="Critical moments ONLY: action · active · selection · live · brand" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;font-family:var(--cc-font-sans);color:var(--cc-ink-1);}
  body{padding:18px 20px;background:var(--cc-panel);}
  .sw{border-radius:8px;border:1px solid var(--cc-rule-strong);}
  .lbl{font-family:var(--cc-font-mono);font-size:10px;color:var(--cc-ink-3);margin-top:6px;}
  .val{font-family:var(--cc-font-mono);font-size:9px;color:var(--cc-ink-faint);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .cell{display:flex;flex-direction:column;}
</style></head><body><div class="row">
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-accent);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">accent</div><div class="val">#3a7550</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-accent-hover);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">accent-hover</div><div class="val">#458a5f</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-ink-accent);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">ink-accent</div><div class="val">#2e5c40</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-accent-wash);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">accent-wash</div><div class="val">#e7efe8</div></div>
</div>
<div style="margin-top:14px;display:flex;gap:10px;align-items:center;">
  <button style="font:600 13px var(--cc-font-sans);color:var(--cc-on-accent);background:var(--cc-accent);border:1px solid var(--cc-accent);border-radius:var(--cc-r-ctrl);padding:7px 13px;">Run pipeline</button>
  <span style="font:600 12px var(--cc-font-sans);color:var(--cc-ink-accent);background:var(--cc-card);border:1px solid var(--cc-rule);border-radius:var(--cc-r-toggle-in);padding:5px 12px;box-shadow:var(--cc-shadow-1);">Active tab</span>
  <span style="font-family:var(--cc-font-mono);font-size:11px;color:var(--cc-accent);background:var(--cc-accent-wash);border:1px solid color-mix(in srgb,var(--cc-accent) 25%,transparent);border-radius:999px;padding:3px 9px;">● running</span>
</div></body></html>
