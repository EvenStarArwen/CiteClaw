<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;font-family:var(--cc-font-sans);color:var(--cc-ink-1);}
  body{padding:18px 20px;background:var(--cc-panel);}
  .sw{border-radius:8px;border:1px solid var(--cc-rule-strong);}
  .lbl{font-family:var(--cc-font-mono);font-size:10px;color:var(--cc-ink-3);margin-top:6px;}
  .val{font-family:var(--cc-font-mono);font-size:9px;color:var(--cc-ink-faint);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .cell{display:flex;flex-direction:column;}
</style></head><body><div class="row">
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-step-seeds);color:#fff;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">seeds</div><div class="val">#8aa695</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-step-forward);color:#fff;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">forward</div><div class="val">#9c7d8a</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-step-backward);color:#fff;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">backward</div><div class="val">#6b82a0</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-step-rerank);color:#fff;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">rerank</div><div class="val">#a89878</div></div>
  <div class="cell"><div class="sw" style="width:104px;height:56px;background:var(--cc-step-rescreen);color:#fff;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;"></div><div class="lbl">rescreen</div><div class="val">#78688a</div></div>
</div></body></html>
