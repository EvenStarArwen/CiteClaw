<!-- @dsCard group="Brand" viewport="700x150" name="Brand mark" subtitle="The CiteClaw claw + wordmark (green in this system)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;font-family:var(--cc-font-sans);color:var(--cc-ink-1);}
  body{padding:18px 20px;background:var(--cc-panel);}
  .sw{border-radius:8px;border:1px solid var(--cc-rule-strong);}
  .lbl{font-family:var(--cc-font-mono);font-size:10px;color:var(--cc-ink-3);margin-top:6px;}
  .val{font-family:var(--cc-font-mono);font-size:9px;color:var(--cc-ink-faint);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .cell{display:flex;flex-direction:column;}
</style></head><body><div style="display:flex;align-items:center;gap:11px;">
  <img src="../assets/logo-claw.svg" width="26" height="25" alt="CiteClaw">
  <span style="font-family:var(--cc-font-sans);font-weight:700;font-size:20px;letter-spacing:-0.2px;color:var(--cc-ink-1);">CiteClaw</span>
  <span style="color:var(--cc-ink-3);font-family:var(--cc-font-mono);font-size:15px;">/</span>
  <span style="font-family:var(--cc-font-mono);font-size:12px;color:var(--cc-accent);background:var(--cc-accent-wash);border:1px solid color-mix(in srgb,var(--cc-accent) 25%,transparent);border-radius:999px;padding:3px 9px;">running</span>
</div></body></html>
