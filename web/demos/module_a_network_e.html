  :root {

    --panel: #1e293b;
    --sub: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #64748b;
    --dim: #94a3b8;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {

    color: var(--text);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    letter-spacing: -0.01em;
    overflow: hidden;
    font-size: 13px;
  }
  .app {
    display: grid;

    grid-template-rows: 60px 1fr 50px;
    grid-template-columns: 1fr 380px;
    grid-template-areas:

      "graph  drawer"
      "status status";
    gap: 1px;
    background: var(--border);

  /* TOPBAR */
  .topbar {
    grid-area: topbar;
    background: var(--panel);
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand .sep { color: var(--accent); font-weight: 400; }
  .topbar-stats {
    margin-left: auto;
    display: flex;
    gap: 2px;
  }
  .stat-box {
    background: var(--sub);
    padding: 8px 16px;
    min-width: 88px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
  }
  .stat-box .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .stat-box .val {
    font-size: 18px;
    color: #fff;
    font-weight: 600;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .stat-box.accent-edge { border-bottom-color: #22c55e; }
  .stat-box.accent-cluster { border-bottom-color: #a855f7; }
  .stat-box.accent-growth { border-bottom-color: #f59e0b; }
  .topbar-ctrls {
    margin-left: 12px;
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    width: 38px; height: 38px;
    background: var(--sub);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--border); color: var(--accent); border-color: var(--accent); }
  .icon-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* GRAPH AREA */
  .graph-wrap {
    grid-area: graph;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }
  #graph {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #182133 0%, #0f172a 80%);
    box-shadow: inset 0 0 40px rgba(56, 189, 248, 0.06);
  }
  /* LEGEND */
  .legend {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(30, 41, 59, 0.92);
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    backdrop-filter: blur(6px);
    min-width: 200px;
  }
  .legend h4 {
    font-size: 9px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.12em;
  }
  .year-bar {
    height: 8px;
    width: 100%;
    background: linear-gradient(to right,

    border: 1px solid var(--border);
    margin-bottom: 3px;
  }
  .year-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--dim);
  }
  .size-scale {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .size-scale svg { display: block; }
  .size-scale .sl {
    display: flex;
    flex-direction: column;
    gap: 1px;
    font-size: 8px;
  }
  .legend-div {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }
  /* MINIMAP */
  .minimap {
    position: absolute;
    right: 12px; bottom: 12px;
    width: 160px; height: 120px;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid var(--border);
    padding: 2px;
  }
  .minimap h5 {
    position: absolute;
    top: 2px; left: 4px;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 2;
  }
  #minimap-canvas {
    display: block;
    width: 100%; height: 100%;
  }

  /* DRAWER */
  .drawer {
    grid-area: drawer;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .drawer-hdr {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--sub);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .drawer-hdr .marker {
    color: var(--accent);
    font-size: 10px;
  }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .drawer-body::-webkit-scrollbar { width: 6px; }
  .drawer-body::-webkit-scrollbar-track { background: var(--panel); }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); }
  .kv-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 12px;
  }
  .kv-table td {
    padding: 5px 6px;
    vertical-align: top;
    border-bottom: 1px dashed var(--border);
  }
  .kv-table td.k {
    color: var(--muted);
    width: 30%;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .kv-table td.v {
    color: var(--text);
    word-break: break-word;
  }
  .kv-table td.v.title {
    color: #fff;
    font-weight: 600;
    font-size: 12px;
    line-height: 1.4;
  }
  .kv-table td.v.cit {
    color: var(--accent);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .kv-table td.v.cluster-tag {
    display: inline-block;
    padding: 1px 8px;
    background: var(--sub);
    border-left: 2px solid var(--accent);
    font-size: 10px;
    color: #fff;
  }
  .abstract {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.55;
    padding: 10px 12px;
    background: var(--sub);
    border-left: 2px solid var(--accent);
    margin-top: 8px;
  }
  .abstract-lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .drawer-empty {
    color: var(--muted);
    font-size: 11px;
    padding: 24px 12px;
    text-align: center;
    line-height: 1.6;
  }
  .drawer-empty .hint {
    color: var(--dim);
    font-size: 9px;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* STATUS BAR */
  .statusbar {
    grid-area: status;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 0 16px;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .status-left, .status-center, .status-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-center { justify-content: center; }
  .status-right { justify-content: flex-end; }
  .status-block {
    background: var(--sub);
    padding: 6px 12px;
    border-left: 2px solid var(--border);
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .status-block strong { color: #fff; margin-left: 4px; font-weight: 500; }
  .status-block.live { border-left-color: var(--ok); }
  .status-block.zoom { border-left-color: var(--accent); }
  .status-block.clock { border-left-color: #f59e0b; }
  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ok);
    display: inline-block;
    animation: pulse 1.6s ease-in-out infinite;
    margin-right: 4px;
  }
  .pulse-dot.off { background: var(--muted); animation: none; }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
    50% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
  }

  /* HOVER TOOLTIP */
  .tooltip {
    position: fixed;
    background: rgba(15, 23, 42, 0.96);
    border: 1px solid var(--accent);
    padding: 5px 9px;
    font-size: 10px;
    color: #fff;
    pointer-events: none;
    z-index: 9999;
    max-width: 220px;
    display: none;
    font-family: inherit;
    letter-spacing: -0.01em;
  }
</style>

// Seed markers: 3 seeds from different clusters
const SEED_IDS = new Set(["p1","p20","p40"]);

// Synthetic edges: ~60% intra / ~40% cross
const EDGES = [];
const addE = (s,t,w) => EDGES.push({s,t,w});
// intra-cluster dense within each cluster (using rank by citation within cluster)
for (let c=0;c<4;c++){
  const ids = PAPERS.filter(p=>p.cluster===c).map(p=>p.id);
  for (let i=0;i<ids.length;i++){
    for (let j=i+1;j<ids.length;j++){
      if (Math.random() < 0.22) addE(ids[i], ids[j], 0.4 + Math.random()*0.6);
    }
  }
}
// cross-cluster sparse
for (let k=0;k<95;k++){
  const a = PAPERS[Math.floor(Math.random()*PAPERS.length)];
  let b = PAPERS[Math.floor(Math.random()*PAPERS.length)];
  while (b.cluster === a.cluster) b = PAPERS[Math.floor(Math.random()*PAPERS.length)];
  addE(a.id, b.id, 0.1 + Math.random()*0.4);
}

function sizeFor(c){ return 2 + 28 * (Math.log1p(c) / Math.log1p(10000)); }
function colorFor(y){ return YEAR_COLORS[y] || "#64748b"; }

const graph = new Graph();
let initialVisible = 30;
let liveGrowthTimer = null;
let growthSamples = []; // timestamps for GROWTH/S metric
let selectedId = null;
let fa2Running = false;

function initGraph(){
  graph.clear();
  growthSamples = [];
  selectedId = null;
  // Pick 30 initial: mix of high-citation + seeds
  const sorted = [...PAPERS].sort((a,b)=>b.c-a.c);
  const initial = new Set();
  SEED_IDS.forEach(id=>initial.add(id));
  for (const p of sorted){ if (initial.size>=initialVisible) break; initial.add(p.id); }

  PAPERS.forEach(p => {
    if (!initial.has(p.id)) return;
    const size = sizeFor(p.c);
    graph.addNode(p.id, {
      label: p.title,
      x: Math.random()*100 - 50,
      y: Math.random()*100 - 50,
      size,
      _targetSize: size,
      _animSize: size,
      color: colorFor(p.year),
      _paper: p,
      forceLabel: false
    });
  });
  EDGES.forEach(e=>{
    if (graph.hasNode(e.s) && graph.hasNode(e.t) && !graph.hasEdge(e.s,e.t)){
      graph.addEdge(e.s,e.t,{weight: e.w, size: e.w*2.5+0.5});
    }
  });
  // Mark top-3 forceLabel
  const topCitsInGraph = graph.nodes()
    .map(n=>({id:n,c:graph.getNodeAttribute(n,"_paper").c}))
    .sort((a,b)=>b.c-a.c).slice(0,3);
  topCitsInGraph.forEach(x=>graph.setNodeAttribute(x.id,"forceLabel",true));
}

initGraph();

const container = document.getElementById("graph");
const sigma = new Sigma(graph, container, {
  labelRenderedSizeThreshold: 8,
  labelColor: { color: "#e2e8f0" },
  labelFont: "IBM Plex Mono, monospace",
  labelSize: 11,
  labelWeight: "500",
  defaultEdgeColor: "#334155",
  nodeReducer: (node, data) => {
    const res = { ...data };
    res.size = data._animSize ?? data.size;
    if (selectedId) {
      if (node === selectedId) {
        res.zIndex = 2;
      } else {
        const neighbors = graph.neighbors(selectedId);
        if (!neighbors.includes(node)) {
          res.color = hexAlpha(data.color, 0.15);
          res.label = "";
        }
      }
    }
    return res;
  },
  edgeReducer: (edge, data) => {
    const res = { ...data, color: graph.getNodeAttribute(graph.target(edge),'color') };
    if (selectedId) {
      const [s,t] = graph.extremities(edge);
      if (s !== selectedId && t !== selectedId) {
        res.color = hexAlpha(res.color, 0.1);
      }
    }
    return res;
  }
});

function hexAlpha(hex, alpha){
  if (!hex || hex[0] !== '#') return hex;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// FA2 worker
let fa2 = new FA2Layout(graph, {
  settings: {
    linLogMode: true,
    adjustSizes: true,
    barnesHutOptimize: true,
    scalingRatio: 10,
    gravity: 1,
    slowDown: 10,
    edgeWeightInfluence: 1
  }
});
function startFA2(){
  try { fa2.start(); fa2Running = true; updateFa2Indicator(); } catch(e){ respawnFA2(); }
}
function respawnFA2(){
  try { fa2.kill(); } catch(e){}
  fa2 = new FA2Layout(graph, {
    settings: {
      linLogMode: true, adjustSizes: true, barnesHutOptimize: true,
      scalingRatio: 10, gravity: 1, slowDown: 10, edgeWeightInfluence: 1
    }
  });
  fa2.start();
  fa2Running = true; updateFa2Indicator();
}
startFA2();

// Supervisor: auto-respawn if worker died
setInterval(() => {
  if (!fa2 || !fa2.isRunning()) {
    if (fa2Running) respawnFA2();
  }
}, 2000);

// Animation loop for _animSize easing
function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }
const animations = new Map(); // id -> {start, dur, from, to}
function tickAnim(){
  const now = performance.now();
  let dirty = false;
  animations.forEach((a,id)=>{
    if (!graph.hasNode(id)){ animations.delete(id); return; }
    const t = Math.min(1,(now - a.start)/a.dur);
    const val = a.from + (a.to - a.from)*easeOutCubic(t);
    graph.setNodeAttribute(id,"_animSize",val);
    dirty = true;
    if (t>=1) animations.delete(id);
  });
  if (dirty) sigma.refresh();
  requestAnimationFrame(tickAnim);
}
requestAnimationFrame(tickAnim);

// Stats updates
function updateStats(){
  document.getElementById("st-nodes").textContent = graph.order;
  document.getElementById("st-edges").textContent = graph.size;
  const clusters = new Set();
  graph.forEachNode((n,a)=>clusters.add(a._paper.cluster));
  document.getElementById("st-clusters").textContent = clusters.size;
  // growth rate: samples in last 5s / 5
  const now = performance.now();
  growthSamples = growthSamples.filter(t=>now-t<5000);
  document.getElementById("st-growth").textContent = (growthSamples.length/5).toFixed(1);
}
setInterval(updateStats, 200);
updateStats();

// Live growth
function addOneNode(){
  const remaining = PAPERS.filter(p=>!graph.hasNode(p.id));
  if (remaining.length===0) return false;
  const p = remaining[Math.floor(Math.random()*remaining.length)];
  // seed near a random neighbor in same cluster or random
  const sameCluster = graph.nodes().filter(n => graph.getNodeAttribute(n,"_paper").cluster === p.cluster);
  const anchor = sameCluster.length>0
    ? sameCluster[Math.floor(Math.random()*sameCluster.length)]
    : graph.nodes()[Math.floor(Math.random()*graph.order)];
  const ax = anchor ? graph.getNodeAttribute(anchor,"x") : 0;
  const ay = anchor ? graph.getNodeAttribute(anchor,"y") : 0;
  const target = sizeFor(p.c);
  graph.addNode(p.id,{
    label: p.title,
    x: ax + (Math.random()*10 - 5),
    y: ay + (Math.random()*10 - 5),
    size: target,
    _targetSize: target,
    _animSize: 0,
    color: colorFor(p.year),
    _paper: p,
    forceLabel: false
  });
  EDGES.forEach(e=>{
    if ((e.s===p.id||e.t===p.id) && graph.hasNode(e.s) && graph.hasNode(e.t) && !graph.hasEdge(e.s,e.t)){
      graph.addEdge(e.s,e.t,{weight:e.w,size:e.w*2.5+0.5});
    }
  });
  animations.set(p.id,{start:performance.now(),dur:400,from:0,to:target});
  growthSamples.push(performance.now());
  return true;
}

const btnPlay = document.getElementById("btn-play");
const btnPause = document.getElementById("btn-pause");
const btnReset = document.getElementById("btn-reset");
function setPlayState(on){
  btnPlay.classList.toggle("active", on);
  btnPause.classList.toggle("active", !on && liveGrowthTimer===null && graph.order>initialVisible);
}
btnPlay.addEventListener("click", ()=>{
  if (liveGrowthTimer) return;
  respawnFA2();
  liveGrowthTimer = setInterval(()=>{
    const ok = addOneNode();
    if (!ok || graph.order >= PAPERS.length){
      clearInterval(liveGrowthTimer);
      liveGrowthTimer = null;
      setPlayState(false);
    }
  },150);
  setPlayState(true);
});
btnPause.addEventListener("click", ()=>{
  if (liveGrowthTimer){ clearInterval(liveGrowthTimer); liveGrowthTimer=null; }
  try { fa2.stop(); fa2Running=false; updateFa2Indicator(); } catch(e){}
  setPlayState(false);
});
btnReset.addEventListener("click", ()=>{
  if (liveGrowthTimer){ clearInterval(liveGrowthTimer); liveGrowthTimer=null; }
  try { fa2.kill(); } catch(e){}
  initGraph();
  fa2 = new FA2Layout(graph, {
    settings:{linLogMode:true,adjustSizes:true,barnesHutOptimize:true,scalingRatio:10,gravity:1,slowDown:10,edgeWeightInfluence:1}
  });
  fa2.start(); fa2Running=true; updateFa2Indicator();
  selectedId = null;
  renderDrawer(null);
  sigma.refresh();
  setPlayState(false);
});

// Click handlers
sigma.on("clickNode", ({node}) => {
  selectedId = node;
  renderDrawer(graph.getNodeAttribute(node,"_paper"));
  sigma.refresh();
});
sigma.on("clickStage", ()=>{
  selectedId = null;
  renderDrawer(null);
  sigma.refresh();
});

// Hover tooltip
const tooltip = document.getElementById("tooltip");
sigma.on("enterNode", ({node, event}) => {
  const p = graph.getNodeAttribute(node,"_paper");
  tooltip.textContent = `${p.title} (${p.year}) ${p.c.toLocaleString()} cits`;
  tooltip.style.display = "block";
});
sigma.on("leaveNode", ()=>{ tooltip.style.display="none"; });
document.addEventListener("mousemove",(e)=>{
  tooltip.style.left = (e.clientX+12)+"px";
  tooltip.style.top = (e.clientY+12)+"px";
  document.getElementById("cursor-val").textContent = `${e.clientX},${e.clientY}`;
});

// Drawer render
function renderDrawer(p){
  const body = document.getElementById("drawer-body");
  const marker = document.getElementById("drawer-marker");
  if (!p){
    marker.innerHTML = "&#9675; NONE";
    marker.style.color = "var(--muted)";
    body.innerHTML = `<div class="drawer-empty">NO SELECTION<div class="hint">Click a node to inspect metadata</div></div>`;
    return;
  }
  const isSeed = SEED_IDS.has(p.id);
  marker.innerHTML = isSeed ? "&#9679; SEED" : "&#9679; ACTIVE";
  marker.style.color = isSeed ? "#f59e0b" : "var(--accent)";
  const authorsStr = p.authors.length > 3
    ? `${p.authors.slice(0,3).join(", ")} et al.`
    : p.authors.join(", ");
  body.innerHTML = `
    <table class="kv-table">
      <tr><td class="k">ID</td><td class="v">${p.id}</td></tr>
      <tr><td class="k">Title</td><td class="v title">${p.title}</td></tr>
      <tr><td class="k">Authors</td><td class="v">${authorsStr}</td></tr>
      <tr><td class="k">Year</td><td class="v">${p.year}</td></tr>
      <tr><td class="k">Venue</td><td class="v">${p.venue}</td></tr>
      <tr><td class="k">Citations</td><td class="v cit">${p.c.toLocaleString()}</td></tr>
      <tr><td class="k">Cluster</td><td class="v"><span class="cluster-tag">C${p.cluster} / ${CLUSTER_NAMES[p.cluster]}</span></td></tr>
      <tr><td class="k">Seed</td><td class="v">${isSeed?"YES":"NO"}</td></tr>
      <tr><td class="k">Full Authors</td><td class="v">${p.authors.join(", ")}</td></tr>
    </table>
    <div class="abstract-lbl">Abstract</div>
    <div class="abstract">${p.ab}</div>
  `;
}

// Zoom indicator
const camera = sigma.getCamera();
camera.on("updated", ()=>{
  const r = camera.ratio;
  document.getElementById("zoom-val").textContent = `${(1/r).toFixed(2)}x`;
  drawMinimap();
});

// Clock
function updateClock(){
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  const s = `2026-04-11 ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  document.getElementById("clock-val").textContent = s;
}
setInterval(updateClock, 1000);
updateClock();

function updateFa2Indicator(){
  const dot = document.getElementById("fa2-dot");
  const txt = document.getElementById("fa2-state");
  if (fa2Running){ dot.classList.remove("off"); txt.textContent="FA2 RUNNING"; }
  else { dot.classList.add("off"); txt.textContent="FA2 IDLE"; }
}

// Minimap
const minimapCanvas = document.getElementById("minimap-canvas");
const mmctx = minimapCanvas.getContext("2d");
function drawMinimap(){
  const w = minimapCanvas.width, h = minimapCanvas.height;
  mmctx.clearRect(0,0,w,h);
  mmctx.fillStyle = "#0f172a";
  mmctx.fillRect(0,0,w,h);
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  graph.forEachNode((n,a)=>{
    if (a.x<minX) minX=a.x; if (a.x>maxX) maxX=a.x;
    if (a.y<minY) minY=a.y; if (a.y>maxY) maxY=a.y;
  });
  if (!isFinite(minX)) return;
  const pad = 20;
  const rw = maxX-minX || 1, rh = maxY-minY || 1;
  const sx = (w-pad*2)/rw, sy = (h-pad*2)/rh;
  const sc = Math.min(sx,sy);
  const ox = pad + ((w-pad*2) - rw*sc)/2;
  const oy = pad + ((h-pad*2) - rh*sc)/2;
  // edges
  mmctx.strokeStyle = "rgba(100,116,139,0.25)";
  mmctx.lineWidth = 0.4;
  graph.forEachEdge((e,attr,src,tgt,sa,ta)=>{
    mmctx.beginPath();
    mmctx.moveTo(ox+(sa.x-minX)*sc, oy+(sa.y-minY)*sc);
    mmctx.lineTo(ox+(ta.x-minX)*sc, oy+(ta.y-minY)*sc);
    mmctx.stroke();
  });
  // nodes
  graph.forEachNode((n,a)=>{
    mmctx.fillStyle = a.color;
    mmctx.beginPath();
    mmctx.arc(ox+(a.x-minX)*sc, oy+(a.y-minY)*sc, 1.8, 0, Math.PI*2);
    mmctx.fill();
  });
  // viewport rect
  const cam = sigma.getCamera();
  const dims = sigma.getDimensions();
  const tl = sigma.viewportToGraph({x:0,y:0});
  const br = sigma.viewportToGraph({x:dims.width,y:dims.height});
  mmctx.strokeStyle = "#ef4444";
  mmctx.lineWidth = 1.2;
  mmctx.strokeRect(
    ox+(tl.x-minX)*sc, oy+(tl.y-minY)*sc,
    (br.x-tl.x)*sc, (br.y-tl.y)*sc
  );
}
setInterval(drawMinimap, 200);
drawMinimap();
