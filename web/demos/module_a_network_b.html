<style>
  :root {

    --ink-soft: #475569;
    --ink-faint: #94a3b8;

    --line-strong: #cbd5e1;
    --accent: #6b46c1;
    --accent-soft: #ede9fe;
    --panel: #fbfbfd;
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: grid;
    grid-template-columns: 22% 53% 25%;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    width: 100vw;
  }
  header.topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    gap: 16px;
    background: #fff;
  }
  header .brand {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  header .brand span.sub {
    font-weight: 400;
    color: var(--ink-faint);
    margin-left: 8px;
    font-size: 13px;
  }
  header .grow-btn {
    margin-left: auto;
    background: var(--ink);
    color: #fff;
    border: 0;
    padding: 8px 14px;
    font: inherit;
    font-weight: 500;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 120ms;
  }
  header .grow-btn:hover { background: #0f172a; }
  header .grow-btn:disabled { background: var(--line-strong); cursor: default; }

  /* ---- Left panel: paper list ---- */
  aside.left {
    border-right: 1px solid var(--line);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--panel);
  }
  .left-header {
    padding: 14px 16px 10px 16px;
    border-bottom: 1px solid var(--line);
    background: #fff;
  }
  .left-header .title {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .left-header select {
    width: 100%;
    padding: 6px 8px;
    font: inherit;
    font-size: 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fff;
    color: var(--ink);
  }
  .list {
    flex: 1;
    overflow-y: auto;
  }
  .list-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 80ms;
  }
  .list-item:hover { background: #f1f5f9; }
  .list-item.active {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding-left: 13px;
  }
  .list-item .li-title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .list-item .li-meta {
    font-size: 11px;
    color: var(--ink-faint);
  }
  .list-item .li-cits {
    float: right;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Center panel: graph ---- */
  main.center {
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  #sigma { position: absolute; inset: 0; }
  .legend {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(255,255,255,0.96);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
    pointer-events: none;
    min-width: 210px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-label {
    font-weight: 600;
    color: var(--ink-soft);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    min-width: 42px;
  }
  .year-bar {
    flex: 1;
    height: 10px;
    border-radius: 2px;
    background: linear-gradient(to right, #fff4a3, #ffda6b, #f4b840, #c4933f, #7a7a9e, #506a98, #2f5c93, #1d3557);
    position: relative;
  }

    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--ink-faint);
    margin-top: 3px;
    padding: 0 1px;
  }
  .size-scale {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .size-dot {
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .size-s { width: 5px; height: 5px; }
  .size-m { width: 10px; height: 10px; }
  .size-l { width: 16px; height: 16px; }
  .size-caption {
    font-size: 9px;
    color: var(--ink-faint);
    margin-left: 2px;
  }
  .seed-legend {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 2px #fff, 0 0 0 3px var(--accent);
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(30, 41, 59, 0.96);
    color: #fff;
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 11px;
    max-width: 280px;
    line-height: 1.35;
    display: none;
    z-index: 20;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.16);
  }

    display: flex;
    flex-direction: column;
    background: #fff;

    align-items: center;
    gap: 10px;

    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);

    justify-content: center;

    color: var(--ink-soft);
    transition: all 120ms;
    padding: 0;

  .pin-btn.pinned {

    border-color: var(--accent);
    color: #fff;
  }

    font-weight: 500;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;

    overflow-y: auto;
    padding: 18px 20px;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-faint);

    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 12px;

    color: var(--ink-soft);
    margin-bottom: 6px;

  .detail .d-venue {
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 14px;
    font-style: italic;
  }
  .detail .d-cites {
    display: inline-block;
    background: #f1f5f9;
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }
  .detail .d-abstract {
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink-soft);
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
</style>
</head>

</div>

const ABSTRACT_SNIPPETS = {
  protein: "We introduce a deep learning approach that models the joint distribution over residue coordinates and side-chain conformations. On standard CASP targets it surpasses homology-based baselines.",
  diffusion: "We present a generative model trained by iteratively denoising samples from a fixed forward process. Empirically we achieve state-of-the-art sample quality at competitive inference cost.",
  nlp: "We scale a transformer language model and study how capabilities emerge as a function of data, compute, and parameters. We report results across a suite of downstream reasoning benchmarks.",
  graph: "We propose a message-passing architecture that aggregates information from local neighborhoods while remaining permutation equivariant. Our method is competitive on node and graph classification."
};

// normalize to objects
const PAPERS = PAPERS_RAW.slice(0, 80).map((row, i) => {
  // row = [title,a1,a2,a3,venue,year,cits,cluster,seed]
  const title = row[0];
  const authors = [row[1], row[2], row[3]].filter(s => s && !/^\d/.test(s));
  const venue = row[4] || "arXiv";
  const year = typeof row[5] === "number" ? row[5] : 2022;
  const cits = typeof row[6] === "number" ? row[6] : 500;
  const cluster = row[7] || "nlp";
  const seed = !!row[8];
  const abs = ABSTRACT_SNIPPETS[cluster] + " The method is validated on " + venue + " benchmarks with strong reported gains.";
  return {
    id: "p" + i,
    title, authors, venue, year, citation_count: cits, cluster, seed,
    abstract: abs
  };
});

// force exactly 3 seeds
let seedsMarked = PAPERS.filter(p => p.seed).length;
if (seedsMarked < 3) {
  const needed = 3 - seedsMarked;
  const extra = PAPERS.filter(p => !p.seed).sort((a,b)=>b.citation_count-a.citation_count).slice(0, needed);
  extra.forEach(p => p.seed = true);
}

// edges: ~60% intra-cluster, ~40% cross-cluster, ~250 total
function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rnd = mulberry32(42);

const EDGES = [];
const seen = new Set();
function addEdge(a, b) {
  if (a === b) return;
  const k = a < b ? a+"|"+b : b+"|"+a;
  if (seen.has(k)) return;
  seen.add(k);
  EDGES.push({ source: a, target: b, weight: 0.15 + rnd() * 0.85 });
}
const byCluster = {};
for (const p of PAPERS) (byCluster[p.cluster] ||= []).push(p);

// intra-cluster edges (~150)
for (const c of Object.keys(byCluster)) {
  const list = byCluster[c];
  for (let i = 0; i < list.length; i++) {
    const k = 2 + Math.floor(rnd() * 3);
    for (let j = 0; j < k; j++) {
      const t = list[Math.floor(rnd() * list.length)];
      addEdge(list[i].id, t.id);
    }
  }
}
// cross-cluster edges (~100)
while (EDGES.length < 250) {
  const a = PAPERS[Math.floor(rnd() * PAPERS.length)];
  const b = PAPERS[Math.floor(rnd() * PAPERS.length)];
  if (a.cluster !== b.cluster) addEdge(a.id, b.id);
}

// ---------- graph ----------
function nodeSize(c) {
  return 2 + 28 * (Math.log1p(c) / Math.log1p(10000));
}
function nodeColor(p) {
  if (p.seed) return SEED_COLOR;
  return YEAR_COLORS[p.year] || "#7a7a9e";
}

const graph = new Graph();

// start with 30, add rest later on growth
const initialIds = new Set();
const topByCit = [...PAPERS].sort((a,b) => b.citation_count - a.citation_count).slice(0, 30);
topByCit.forEach(p => initialIds.add(p.id));

// ensure all 3 seeds are in initial
PAPERS.filter(p => p.seed).forEach(p => initialIds.add(p.id));

const remaining = PAPERS.filter(p => !initialIds.has(p.id));

// place initial nodes in a rough cluster layout
const clusterAngles = { protein: 0, diffusion: Math.PI/2, nlp: Math.PI, graph: 3*Math.PI/2 };
function randomSeedPos(p) {
  const a = clusterAngles[p.cluster] ?? 0;
  const r = 8 + rnd() * 4;
  return { x: Math.cos(a)*r + (rnd()-0.5)*3, y: Math.sin(a)*r + (rnd()-0.5)*3 };
}

for (const p of PAPERS.filter(p => initialIds.has(p.id))) {
  const { x, y } = randomSeedPos(p);
  const s = nodeSize(p.citation_count);
  graph.addNode(p.id, {
    x, y,
    label: p.title,
    size: s,
    _animSize: s,
    _targetSize: s,
    color: nodeColor(p),
    _paper: p
  });
}
for (const e of EDGES) {
  if (graph.hasNode(e.source) && graph.hasNode(e.target)) {
    graph.addEdge(e.source, e.target, { size: e.weight * 2.5 + 0.5, color: "#cbd5e1", _weight: e.weight });
  }
}

// force-label top-3 by citation
const top3 = [...PAPERS].sort((a,b) => b.citation_count - a.citation_count).slice(0, 3).map(p => p.id);

// ---------- state (must precede new Sigma: reducers run synchronously in constructor, TDZ otherwise) ----------
const state = {
  selectedId: null,
  hoverId: null,
  pinned: false,
  sortBy: "citations",
  visibleIds: new Set(initialIds)
};

// ---------- sigma ----------
const container = document.getElementById("sigma");
const sigma = new Sigma(graph, container, {
  renderLabels: true,
  labelFont: "Inter, system-ui, sans-serif",
  labelColor: { color: "#1e293b" },
  labelSize: 12,
  labelWeight: "600",
  labelRenderedSizeThreshold: 8,
  defaultEdgeColor: "#cbd5e1",
  edgeReducer: (edge, data) => {
    const target = graph.target(edge);
    const source = graph.source(edge);
    const out = { ...data };
    out.color = graph.getNodeAttribute(target, "color");
    if (state.selectedId) {
      if (source === state.selectedId || target === state.selectedId) {
        out.color = graph.getNodeAttribute(target, "color");
      } else {
        out.color = "rgba(203, 213, 225, 0.25)";
      }
    }
    return out;
  },
  nodeReducer: (id, data) => {
    const out = { ...data, size: data._animSize ?? data.size };
    if (state.selectedId && id !== state.selectedId) {
      // dim others; 1-hop neighbors retain partial color
      const isNeighbor = graph.areNeighbors(state.selectedId, id);
      if (!isNeighbor) {
        out.color = hexToRgba(data.color, 0.15);
        out.label = null;
      }
    }
    if (top3.includes(id)) out.forceLabel = true;
    return out;
  }
});

function hexToRgba(hex, a) {
  if (!hex || hex[0] !== "#") return hex;
  const h = hex.slice(1);
  const v = h.length === 3 ? h.split("").map(c => c+c).join("") : h;
  const r = parseInt(v.slice(0,2),16), g = parseInt(v.slice(2,4),16), b = parseInt(v.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ---------- FA2 ----------
const layout = new FA2Layout(graph, {
  settings: {
    linLogMode: true,
    adjustSizes: true,
    barnesHutOptimize: true,
    scalingRatio: 10,
    gravity: 1,
    slowDown: 10,
    edgeWeightInfluence: 1
  }
});
layout.start();

// ---------- UI: list ----------
const listEl = document.getElementById("list");
const leftTitleEl = document.getElementById("leftTitle");
const sortSelect = document.getElementById("sortSelect");

function renderList() {
  const visible = PAPERS.filter(p => state.visibleIds.has(p.id));
  const sorted = [...visible].sort((a,b) => {
    if (state.sortBy === "citations") return b.citation_count - a.citation_count;
    if (state.sortBy === "year") return b.year - a.year;
    if (state.sortBy === "title") return a.title.localeCompare(b.title);
    return 0;
  });
  leftTitleEl.textContent = `Papers (${visible.length})`;
  listEl.innerHTML = "";
  for (const p of sorted) {
    const row = document.createElement("div");
    row.className = "list-item" + (state.selectedId === p.id ? " active" : "");
    row.dataset.id = p.id;
    row.innerHTML = `
      <div class="li-title">${escape(p.title)}</div>
      <div class="li-meta">
        <span class="li-cits">${formatCits(p.citation_count)}</span>
        ${escape(p.authors[0] || "")} · ${p.year}
      </div>`;
    row.addEventListener("click", () => {
      pinPaper(p.id);
    });
    listEl.appendChild(row);
  }
}
function formatCits(c) {
  if (c >= 1000) return (c/1000).toFixed(1) + "k";
  return String(c);
}
function escape(s) {
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
sortSelect.addEventListener("change", () => {
  state.sortBy = sortSelect.value;
  renderList();
});

// ---------- UI: detail drawer ----------
const detailEl = document.getElementById("detail");
const pinBtn = document.getElementById("pinBtn");
const pinStatus = document.getElementById("pinStatus");
const tooltip = document.getElementById("tooltip");

function renderDetail(paperId) {
  if (!paperId) {
    detailEl.className = "detail empty";
    detailEl.textContent = "Hover a paper to preview";
    return;
  }
  const p = PAPERS.find(x => x.id === paperId);
  if (!p) return;
  detailEl.className = "detail";
  const authorStr = p.authors.slice(0,3).join(", ") + (p.authors.length > 3 ? ", et al." : "");
  const abs = p.abstract.length > 200 ? p.abstract.slice(0, 200) + "…" : p.abstract;
  detailEl.innerHTML = `
    <div>
      <span class="d-cluster">${escape(CLUSTERS[p.cluster]?.label ?? p.cluster)}</span>
      ${p.seed ? '<span class="d-seed">Seed</span>' : ''}
    </div>
    <h2>${escape(p.title)}</h2>
    <div class="d-authors">${escape(authorStr)}</div>
    <div class="d-venue">${escape(p.venue)} · ${p.year}</div>
    <div class="d-cites">${p.citation_count.toLocaleString()} citations</div>
    <div class="d-abstract">${escape(abs)}</div>
  `;
}

function updatePinUI() {
  if (state.pinned) {
    pinBtn.classList.add("pinned");
    pinStatus.classList.add("is-pinned");
    pinStatus.textContent = "Pinned";
    pinBtn.title = "Click to unpin";
  } else {
    pinBtn.classList.remove("pinned");
    pinStatus.classList.remove("is-pinned");
    pinStatus.textContent = "Hover mode";
    pinBtn.title = "Click a node to pin";
  }
}

function pinPaper(id) {
  state.selectedId = id;
  state.pinned = true;
  renderDetail(id);
  updatePinUI();
  renderList();
  sigma.refresh();
}
function unpin() {
  state.pinned = false;
  state.selectedId = null;
  updatePinUI();
  renderList();
  if (state.hoverId) renderDetail(state.hoverId);
  else renderDetail(null);
  sigma.refresh();
}

pinBtn.addEventListener("click", () => {
  if (state.pinned) unpin();
});

// ---------- sigma events ----------
sigma.on("enterNode", ({ node, event }) => {
  state.hoverId = node;
  if (!state.pinned) {
    renderDetail(node);
  }
  const p = graph.getNodeAttribute(node, "_paper");
  tooltip.style.display = "block";
  tooltip.textContent = `${p.title} (${p.year})`;
  moveTooltip(event);
});
sigma.on("leaveNode", () => {
  state.hoverId = null;
  tooltip.style.display = "none";
  if (!state.pinned) renderDetail(null);
});
sigma.getMouseCaptor().on("mousemovebody", (e) => moveTooltip(e));
function moveTooltip(event) {
  if (tooltip.style.display !== "block") return;
  const rect = container.getBoundingClientRect();
  const ev = event.original || event;
  const cx = (ev.clientX ?? 0) - rect.left;
  const cy = (ev.clientY ?? 0) - rect.top;
  tooltip.style.left = (cx + 12) + "px";
  tooltip.style.top = (cy + 12) + "px";
}
sigma.on("clickNode", ({ node }) => {
  pinPaper(node);
});
sigma.on("clickStage", () => {
  if (state.pinned) unpin();
});

// ---------- live growth ----------
const growBtn = document.getElementById("growBtn");
const animNodes = new Map();

function tickAnimations() {
  let active = false;
  const now = performance.now();
  animNodes.forEach((a, id) => {
    const t = Math.min(1, (now - a.start) / a.dur);
    const eased = 1 - Math.pow(1 - t, 3);
    const s = a.from + (a.to - a.from) * eased;
    if (graph.hasNode(id)) graph.setNodeAttribute(id, "_animSize", s);
    if (t >= 1) animNodes.delete(id);
    else active = true;
  });
  sigma.refresh();
  if (active) requestAnimationFrame(tickAnimations);
}

function addPaperWithAnim(p) {
  if (graph.hasNode(p.id)) return;
  // seed near a random existing neighbor (prefer same cluster)
  const nodes = graph.nodes();
  const sameCluster = nodes.filter(id => {
    const pp = graph.getNodeAttribute(id, "_paper");
    return pp.cluster === p.cluster;
  });
  const pool = sameCluster.length ? sameCluster : nodes;
  const anchor = pool[Math.floor(rnd() * pool.length)];
  const ax = graph.getNodeAttribute(anchor, "x");
  const ay = graph.getNodeAttribute(anchor, "y");
  const target = nodeSize(p.citation_count);
  graph.addNode(p.id, {
    x: ax + (rnd()-0.5) * 10,
    y: ay + (rnd()-0.5) * 10,
    label: p.title,
    size: target,
    _animSize: 0,
    _targetSize: target,
    color: nodeColor(p),
    _paper: p
  });
  // add edges whose both endpoints now exist
  for (const e of EDGES) {
    if ((e.source === p.id || e.target === p.id) &&
        graph.hasNode(e.source) && graph.hasNode(e.target) &&
        !graph.hasEdge(e.source, e.target)) {
      graph.addEdge(e.source, e.target, { size: e.weight * 2.5 + 0.5, color: "#cbd5e1", _weight: e.weight });
    }
  }
  animNodes.set(p.id, { from: 0, to: target, start: performance.now(), dur: 400 });
  state.visibleIds.add(p.id);
}

growBtn.addEventListener("click", () => {
  if (growBtn.disabled) return;
  growBtn.disabled = true;
  growBtn.textContent = "Growing…";
  const queue = [...remaining];
  let i = 0;
  const iv = setInterval(() => {
    if (i >= queue.length) {
      clearInterval(iv);
      growBtn.textContent = "Growth complete";
      return;
    }
    addPaperWithAnim(queue[i++]);
    renderList();
    if (animNodes.size === 1) requestAnimationFrame(tickAnimations);
  }, 150);
});

// initial render
renderList();
updatePinUI();
</script>
</body>
</html>
