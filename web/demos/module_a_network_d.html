  ];

function mkEdges(papers){
  const byCluster = {};
  papers.forEach(p=>{(byCluster[p.cluster]=byCluster[p.cluster]||[]).push(p.id);});
  const edges = [];
  const seen = new Set();
  function add(a,b,w){
    if (a===b) return;
    const k = a<b ? a+"|"+b : b+"|"+a;
    if (seen.has(k)) return;
    seen.add(k);
    edges.push({source:a, target:b, weight:w});
  }
  let seed = 1337;
  function rnd(){seed = (seed*9301+49297)%233280; return seed/233280;}
  Object.values(byCluster).forEach(ids=>{
    for (let i=0;i<ids.length;i++){
      const fan = 2 + Math.floor(rnd()*3);
      for (let k=0;k<fan;k++){
        const j = Math.floor(rnd()*ids.length);
        add(ids[i], ids[j], 0.4 + rnd()*0.6);
      }
    }
  });
  const all = papers.map(p=>p.id);
  const crossTarget = Math.floor(edges.length * 0.66);
  let guard = 0;
  while (edges.length - crossTarget < crossTarget && guard < 400){
    const a = all[Math.floor(rnd()*all.length)];
    const b = all[Math.floor(rnd()*all.length)];
    const pa = papers.find(p=>p.id===a);
    const pb = papers.find(p=>p.id===b);
    if (pa.cluster !== pb.cluster) add(a,b, 0.15 + rnd()*0.35);
    guard++;
  }
  while (edges.length < 250 && guard < 800){
    const a = all[Math.floor(rnd()*all.length)];
    const b = all[Math.floor(rnd()*all.length)];
    add(a,b, 0.15 + rnd()*0.35);
    guard++;
  }
  return edges;
}

const ALL_PAPERS = mkPapers();

  defaultEdgeColor: "#a8a198",

  labelSize: 11,
  labelWeight: "500",
  labelRenderedSizeThreshold: 8,
  renderEdgeLabels: false,
  edgeReducer: (edge, data) => {
    const res = { ...data };
    const tgt = graph.target(edge);
    res.color = graph.getNodeAttribute(tgt, "color");
    const dimmed = state.selected && !state.hopEdges.has(edge);
    res.color = hexWithAlpha(res.color, dimmed ? 0.08 : 0.25);
    return res;
  },
  nodeReducer: (node, data) => {
    const res = { ...data };
    const s = graph.getNodeAttribute(node, "_animSize");
    if (typeof s === "number") res.size = s;
    if (state.selected && node !== state.selected && !state.hop1.has(node)) {
      res.color = hexWithAlpha(data.color, 0.15);
      res.label = undefined;
    }
    if (top3Ids.includes(node)) res.forceLabel = true;
    return res;
  }
});

function hexWithAlpha(hex, a){
  if (hex.startsWith("rgba")) return hex;
  if (hex.startsWith("#") && hex.length === 7){
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  return hex;
}

const state = {
  added: new Set(),
  growing: false,
  selected: null,
  hop1: new Set(),
  hopEdges: new Set(),
  layout: null,
  animTimers: []
};

function addPaperToGraph(p, x, y){
  const target = sizeFor(p.citation_count);
  graph.addNode(p.id, {
    x, y,
    label: p.title.length > 48 ? p.title.slice(0,46) + "…" : p.title,
    size: 0.01,
    _animSize: 0.01,
    _targetSize: target,
    color: colorFor(p.year),
    _paper: p
  });
  state.added.add(p.id);
  animateSize(p.id, target, 600);
}

function addEdgeIfBothPresent(e){
  if (graph.hasNode(e.source) && graph.hasNode(e.target) && !graph.hasEdge(e.source, e.target)){
    graph.addEdge(e.source, e.target, {
      size: Math.min(e.weight * 2.5 + 0.5, 1.5),
      weight: e.weight
    });
  }
}

function animateSize(id, target, dur){
  const start = performance.now();
  function frame(t){
    if (!graph.hasNode(id)) return;
    const k = Math.min(1, (t - start) / dur);
    const eased = 1 - Math.pow(1 - k, 4);
    graph.setNodeAttribute(id, "_animSize", 0.01 + (target - 0.01) * eased);
    sigmaInstance.refresh();
    if (k < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function seedInitial(){
  const initial = ALL_PAPERS.slice(0, 30);
  initial.forEach((p,i)=>{
    const angle = (i / initial.length) * Math.PI * 2;
    const r = 30 + (i % 5) * 6;
    addPaperToGraph(p, Math.cos(angle)*r, Math.sin(angle)*r);
  });
  ALL_EDGES.forEach(addEdgeIfBothPresent);
  updateCounts();
}

function updateCounts(){
  document.getElementById("n-visible").textContent = graph.order;
  document.getElementById("n-total").textContent = ALL_PAPERS.length;
}

function startLayout(){
  state.layout = new FA2Layout(graph, {
    settings: {
      linLogMode: true,
      adjustSizes: true,
      barnesHutOptimize: true,
      scalingRatio: 10,
      gravity: 1,
      slowDown: 10,
      edgeWeightInfluence: 1
    }
  });
  state.layout.start();
}

function stopLayout(){
  if (state.layout){ state.layout.kill(); state.layout = null; }
}

function simulateGrowth(){
  if (state.growing) return;
  const remaining = ALL_PAPERS.filter(p => !state.added.has(p.id));
  if (remaining.length === 0) return;
  state.growing = true;
  document.getElementById("btn-grow").disabled = true;
  const toAdd = remaining.slice(0, 50);
  let i = 0;
  function tick(){
    if (i >= toAdd.length){
      state.growing = false;
      document.getElementById("btn-grow").disabled = false;
      return;
    }
    const p = toAdd[i++];
    const nodes = graph.nodes();
    let x = 0, y = 0;
    if (nodes.length){
      const anchor = nodes[Math.floor(Math.random() * nodes.length)];
      x = graph.getNodeAttribute(anchor, "x") + (Math.random()*10-5);
      y = graph.getNodeAttribute(anchor, "y") + (Math.random()*10-5);
    }
    addPaperToGraph(p, x, y);
    ALL_EDGES.forEach(e=>{
      if (e.source === p.id || e.target === p.id) addEdgeIfBothPresent(e);
    });
    updateCounts();
    const t = setTimeout(tick, 150);
    state.animTimers.push(t);
  }
  tick();
}

function resetGraph(){
  state.animTimers.forEach(clearTimeout);
  state.animTimers = [];
  stopLayout();
  graph.clear();
  state.added.clear();
  state.growing = false;
  state.selected = null;
  state.hop1.clear();
  state.hopEdges.clear();
  document.getElementById("btn-grow").disabled = false;
  closePanel();
  seedInitial();
  startLayout();
}

function openPanel(nodeId){
  const p = graph.getNodeAttribute(nodeId, "_paper");
  if (!p) return;
  state.selected = nodeId;
  state.hop1 = new Set([nodeId, ...graph.neighbors(nodeId)]);
  state.hopEdges = new Set(graph.edges(nodeId));
  document.getElementById("panel-cluster").textContent = CLUSTERS[p.cluster] || p.cluster;
  document.getElementById("panel-title").textContent = p.title;
  const authors = p.authors.slice(0,3).join(", ") + (p.authors.length > 3 ? ", et al." : "");
  document.getElementById("panel-authors").textContent = authors;
  document.getElementById("panel-venue").textContent = `${p.venue}, ${p.year}`;
  document.getElementById("panel-cites").textContent = p.citation_count.toLocaleString();
  document.getElementById("panel-year").textContent = p.year;
  document.getElementById("panel-seed").textContent = p.seed ? "yes" : "no";
  document.getElementById("panel-abstract").textContent = p.abstract;
  document.getElementById("panel").classList.add("open");
  sigmaInstance.refresh();
}

function closePanel(){
  state.selected = null;
  state.hop1.clear();
  state.hopEdges.clear();
  document.getElementById("panel").classList.remove("open");
  sigmaInstance.refresh();
}

sigmaInstance.on("clickNode", ({ node }) => openPanel(node));
sigmaInstance.on("clickStage", () => closePanel());

const tooltip = document.getElementById("tooltip");
sigmaInstance.on("enterNode", ({ node, event }) => {
  const p = graph.getNodeAttribute(node, "_paper");
  if (!p) return;
  tooltip.textContent = p.title;
  tooltip.style.display = "block";
});
sigmaInstance.on("leaveNode", () => { tooltip.style.display = "none"; });
sigmaInstance.getMouseCaptor().on("mousemovebody", (e) => {
  if (tooltip.style.display === "block"){
    tooltip.style.left = (e.x + 14) + "px";
    tooltip.style.top = (e.y + 14) + "px";
  }
});

document.getElementById("btn-grow").addEventListener("click", simulateGrowth);
document.getElementById("btn-reset").addEventListener("click", resetGraph);
document.getElementById("panel-close").addEventListener("click", closePanel);

seedInitial();
startLayout();
</script>
</body>
</html>
