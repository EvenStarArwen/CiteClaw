<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CiteClaw · New run — Variant B (Rounded Minimal)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --panel: #fbf9f3;
    --border: #e4e0d4;
    --chrome: #faf8f2;
    --ink: #1e2735;
    --secondary: #55606d;
    --tertiary: #7f768c;
    --accent: #3e3548;
    --positive: #5a8570;
    --warning: #8b5a5a;
    --btn-border: #c4bcaa;
    --btn-hover: #f0ecde;
    --curve: #c4bcaa;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  .section-a {
    flex: 0 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--chrome);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.2px;
  }
  .brand span.sep { color: var(--tertiary); margin: 0 8px; font-weight: 400; }
  .brand span.sub { color: var(--secondary); font-weight: 400; }

  .btn {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--btn-border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn.primary { border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: var(--btn-hover); }

  .main-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: 60% 40%;
    grid-template-areas:
      "b c e"
      "b d e";
    min-height: 0;
  }
  .section-b { grid-area: b; }
  .section-c { grid-area: c; }
  .section-d { grid-area: d; }
  .section-e { grid-area: e; }

  .section-b, .section-c, .section-d, .section-e {
    background: var(--panel);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .section-e { border-right: none; }

  .panel-header {
    flex: 0 0 auto;
    padding: 14px 18px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--tertiary);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  /* -------- Section B: seed papers -------- */
  .seed-search-wrap {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .seed-search {
    width: 100%;
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: var(--chrome);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.12s ease;
  }
  .seed-search::placeholder { color: var(--tertiary); }
  .seed-search:focus { border-color: var(--accent); }

  .seed-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px 12px;
  }
  .seed-item {
    padding: 10px 12px;
    margin: 4px 0;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .seed-item:hover { background: var(--chrome); }
  .seed-item.selected {
    background: var(--chrome);
    border-color: var(--accent);
  }
  .seed-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .seed-meta {
    font-size: 10.5px;
    color: var(--tertiary);
    line-height: 1.35;
  }
  .seed-meta .venue { color: var(--secondary); font-weight: 500; }
  .seed-meta .cit   { font-family: "IBM Plex Mono", monospace; font-size: 10px; }

  /* -------- Section C: canvas -------- */
  .canvas-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 24px;
  }
  svg.pipeline {
    display: block;
    min-width: 1180px;
    min-height: 340px;
    background:
      radial-gradient(circle at 12px 12px, #ebe6d8 1px, transparent 1px);
    background-size: 24px 24px;
    background-color: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  svg.pipeline .block { cursor: pointer; }
  svg.pipeline .block-label {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: middle;
    user-select: none;
    pointer-events: none;
  }

  /* -------- Section D: config -------- */
  .config-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px 18px;
  }
  .config-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
  }
  .config-row:last-child { border-bottom: none; }
  .config-key {
    flex: 0 0 110px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--tertiary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding-top: 2px;
  }
  .config-val {
    flex: 1;
    font-size: 12px;
    color: var(--ink);
    line-height: 1.45;
  }
  .config-val textarea {
    width: 100%;
    min-height: 64px;
    resize: vertical;
    font-family: "Inter", sans-serif;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--chrome);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    outline: none;
  }
  .config-val textarea[readonly] { cursor: default; }
  .chip {
    display: inline-block;
    padding: 3px 9px;
    margin: 2px 4px 2px 0;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11px;
    color: var(--secondary);
    background: var(--chrome);
  }
  .kv-mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--secondary); }

  /* -------- Section E: building blocks -------- */
  .catalog {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 16px;
  }
  .cat-group { margin-bottom: 14px; }
  .cat-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--tertiary);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 4px 6px;
  }
  .cat-chip {
    display: block;
    padding: 8px 12px;
    margin: 4px 0;
    background: var(--chrome);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .cat-chip:hover { background: var(--btn-hover); border-color: var(--btn-border); }
  .cat-chip-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
  }
  .cat-chip-desc {
    font-size: 10.5px;
    color: var(--tertiary);
    margin-top: 2px;
    line-height: 1.35;
  }

  /* -------- Section F: status bar -------- */
  .section-f {
    flex: 0 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--chrome);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--secondary);
  }
  .section-f .status-left { font-family: "IBM Plex Mono", monospace; letter-spacing: 0.3px; }
  .section-f .status-right { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--positive);
    display: inline-block;
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #e0dbcb; border-radius: 10px; border: 2px solid var(--panel); }
  ::-webkit-scrollbar-thumb:hover { background: var(--btn-border); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div class="app">

  <!-- ============ Section A: top nav ============ -->
  <header class="section-a">
    <div class="brand">
      CiteClaw <span class="sep">·</span> <span class="sub">New run</span>
    </div>
    <button class="btn primary" id="btn-run">Run pipeline</button>
  </header>

  <!-- ============ Main grid ============ -->
  <div class="main-grid">

    <!-- ============ Section B: seed papers ============ -->
    <aside class="section-b">
      <div class="panel-header">Seed papers</div>
      <div class="seed-search-wrap">
        <input class="seed-search" id="seed-search" type="text" placeholder="Search papers by title, author, DOI…" />
      </div>
      <div class="seed-list" id="seed-list"></div>
    </aside>

    <!-- ============ Section C: pipeline canvas ============ -->
    <main class="section-c">
      <div class="panel-header">Pipeline</div>
      <div class="canvas-wrap">
        <svg class="pipeline" id="pipeline-svg" viewBox="0 0 1180 340" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="selected-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="blur" />
              <feOffset in="blur" dx="0" dy="0" result="offset" />
              <feFlood flood-color="#3e3548" flood-opacity="0.35" result="color" />
              <feComposite in="color" in2="offset" operator="in" result="shadow" />
              <feMerge>
                <feMergeNode in="shadow" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4"
                    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M0,0 L8,4 L0,8 Z" fill="#c4bcaa" />
            </marker>
          </defs>
          <g id="edges-layer"></g>
          <g id="nodes-layer"></g>
        </svg>
      </div>
    </main>

    <!-- ============ Section D: config ============ -->
    <section class="section-d">
      <div class="panel-header" id="config-header">Configuration · Seeds + Topic</div>
      <div class="config-body" id="config-body"></div>
    </section>

    <!-- ============ Section E: building blocks palette ============ -->
    <aside class="section-e">
      <div class="panel-header">Building blocks</div>
      <div class="catalog" id="catalog"></div>
    </aside>
  </div>

  <!-- ============ Section F: status bar ============ -->
  <footer class="section-f">
    <div class="status-left" id="status-left">7 blocks · topic set · 3 seeds selected · ready to run</div>
    <div class="status-right">
      <span class="dot"></span>
      <span>Session: demo</span>
    </div>
  </footer>
</div>

<script>
/* ===================== Design tokens ===================== */
const BLOCK_COLORS = {
  seeds:    { fill: "#8aa695", stroke: "#5a7c6b", textOnFill: "#ffffff" },
  forward:  { fill: "#9c7d8a", stroke: "#755a66", textOnFill: "#ffffff" },
  backward: { fill: "#6b82a0", stroke: "#48627a", textOnFill: "#ffffff" },
  rerank:   { fill: "#a89878", stroke: "#7a6b4e", textOnFill: "#ffffff" },
  rescreen: { fill: "#78688a", stroke: "#584868", textOnFill: "#ffffff" }
};

/* Variant B: desaturated fills (65% base + 35% cream #f5f3ee), precomputed */
const DESAT_FILLS = {
  seeds:    "#a7bcb2",
  forward:  "#b59ba3",
  backward: "#9cacbf",
  rerank:   "#c1b699",
  rescreen: "#9a8aa5"
};

/* ===================== Mock data ===================== */
const MOCK_PIPELINE = {
  nodes: [
    { id: "seeds",    type: "seeds",    label: "Seeds + Topic",        shape: "parallelogram", x: 40,  y: 140 },
    { id: "fwd1",     type: "forward",  label: "Forward Screener",     shape: "rect",          x: 220, y: 140 },
    { id: "bwd1",     type: "backward", label: "Backward Screener",    shape: "rect",          x: 400, y: 140 },
    { id: "rerank",   type: "rerank",   label: "Diversified Reranker", shape: "rect",          x: 600, y: 60  },
    { id: "fwd2",     type: "forward",  label: "Forward Screener",     shape: "rect",          x: 800, y: 60  },
    { id: "bwd2",     type: "backward", label: "Backward Screener",    shape: "rect",          x: 600, y: 220 },
    { id: "rescreen", type: "rescreen", label: "Rescreener",           shape: "rect",          x: 1000,y: 140 }
  ],
  edges: [
    { from: "seeds",  to: "fwd1" },
    { from: "fwd1",   to: "bwd1" },
    { from: "bwd1",   to: "rerank" },
    { from: "bwd1",   to: "bwd2" },
    { from: "rerank", to: "fwd2" },
    { from: "fwd2",   to: "rescreen" },
    { from: "bwd2",   to: "rescreen" }
  ]
};

const MOCK_SEED_RESULTS = [
  { id: "p1",  title: "Highly accurate protein structure prediction with AlphaFold",             authors: "Jumper, Evans, Pritzel, et al.", year: 2021, venue: "Nature",         citations: 7900 },
  { id: "p2",  title: "AlphaFold 3: All-atom structure prediction across biomolecules",          authors: "Abramson, Adler, Dunger, et al.",year: 2024, venue: "Nature",         citations: 820  },
  { id: "p3",  title: "RoseTTAFold: Accurate prediction of protein structures and interactions", authors: "Baek, DiMaio, Anishchenko",      year: 2021, venue: "Science",        citations: 3200 },
  { id: "p4",  title: "ESMFold: Evolutionary-scale prediction of atomic-level protein structure",authors: "Lin, Akin, Rao, et al.",         year: 2023, venue: "Science",        citations: 2100 },
  { id: "p5",  title: "ColabFold: Making protein folding accessible to all",                     authors: "Mirdita, Schutze, Moriwaki",     year: 2022, venue: "Nature Methods", citations: 2900 },
  { id: "p6",  title: "OmegaFold: High-resolution de novo structure prediction",                 authors: "Wu, Ding, Wang",                 year: 2022, venue: "bioRxiv",        citations: 520  },
  { id: "p7",  title: "ProteinMPNN: Robust deep learning based protein sequence design",         authors: "Dauparas, Anishchenko, Bennett", year: 2022, venue: "Science",        citations: 1700 },
  { id: "p8",  title: "RFdiffusion: Broadly applicable and accurate protein design",             authors: "Watson, Juergens, Bennett",      year: 2023, venue: "Nature",         citations: 1400 },
  { id: "p9",  title: "Chai-1: Decoding the molecular interactions of life",                     authors: "Boitreaud, Dent, McPartlon",     year: 2024, venue: "bioRxiv",        citations: 310  },
  { id: "p10", title: "Boltz-1: Democratizing biomolecular interaction modeling",                authors: "Wohlwend, Corso, Passaro",       year: 2024, venue: "bioRxiv",        citations: 240  }
];
const INITIAL_SELECTED_SEEDS = ["p1", "p3", "p5"];

const BUILDING_BLOCKS_CATALOG = {
  "SEEDS":    [{ id: "LoadSeeds", type: "seeds", label: "Load Seeds", desc: "Initialize collection from seeds" }, { id: "ResolveSeeds", type: "seeds", label: "Resolve Seeds", desc: "Fuzzy-match seed titles via S2" }],
  "EXPAND":   [{ id: "ExpandForward", type: "forward", label: "Expand Forward", desc: "Fetch citers of accepted" }, { id: "ExpandBackward", type: "backward", label: "Expand Backward", desc: "Fetch references" }, { id: "ExpandBySearch", type: "forward", label: "Expand by Search", desc: "Iterative LLM search agent" }, { id: "ExpandBySemantics", type: "forward", label: "Expand by Semantics", desc: "SPECTER2 kNN recommendations" }, { id: "ExpandByAuthor", type: "forward", label: "Expand by Author", desc: "Top-K authors and their papers" }],
  "FILTER":   [{ id: "Rerank", type: "rerank", label: "Rerank", desc: "Top-K with cluster diversity" }, { id: "ReScreen", type: "rescreen", label: "Re-screen", desc: "Apply screener to collection" }, { id: "Cluster", type: "rerank", label: "Cluster", desc: "Topic-model clusters" }],
  "CONTROL":  [{ id: "Parallel", type: "forward", label: "Parallel", desc: "Branch and union" }, { id: "HumanInTheLoop", type: "forward", label: "Human in the Loop", desc: "Interactive quality check" }, { id: "MergeDuplicates", type: "forward", label: "Merge Duplicates", desc: "Preprint-published dedup" }],
  "FINALIZE": [{ id: "Finalize", type: "rescreen", label: "Finalize", desc: "Write outputs" }]
};

const BLOCK_CONFIGS = {
  "seeds":    { topic: "Deep learning methods for protein structure prediction and design, including AlphaFold-family models and diffusion-based approaches.", seedCount: 3 },
  "fwd1":     { name: "Forward Screener",  filters: ["YearFilter 2018-2025", "CitationFilter beta=30", "LLMFilter topic_match"], model: "gemma-4-31b", reasoning: "medium" },
  "bwd1":     { name: "Backward Screener", filters: ["YearFilter 2018-2025", "CitationFilter beta=30", "LLMFilter topic_match"], model: "gemma-4-31b", reasoning: "medium" },
  "rerank":   { metric: "pagerank", k: 3, diversity: "forward_topics" },
  "fwd2":     { name: "Forward Screener",  filters: ["YearFilter 2018-2025", "CitationFilter beta=30", "LLMFilter topic_match"], model: "gemma-4-31b", reasoning: "medium" },
  "bwd2":     { name: "Backward Screener", filters: ["YearFilter 2018-2025", "CitationFilter beta=30", "LLMFilter topic_match"], model: "gemma-4-31b", reasoning: "medium" },
  "rescreen": { target: "entire collection", screener: "tight_screener" }
};

/* ===================== App state ===================== */
const state = {
  selectedBlockId: "seeds",
  selectedSeeds: new Set(INITIAL_SELECTED_SEEDS),
  searchQuery: ""
};

/* ===================== Helpers ===================== */
const SVG_NS = "http://www.w3.org/2000/svg";
const BLOCK_W = 120;
const BLOCK_H = 52;

function nodeCenter(n) { return { cx: n.x + BLOCK_W / 2, cy: n.y + BLOCK_H / 2 }; }
function nodeRightMid(n) { return { x: n.x + BLOCK_W, y: n.y + BLOCK_H / 2 }; }
function nodeLeftMid(n)  { return { x: n.x,           y: n.y + BLOCK_H / 2 }; }

/* ===================== Seed list render ===================== */
function renderSeedList() {
  const list = document.getElementById("seed-list");
  const q = state.searchQuery.trim().toLowerCase();
  const filtered = MOCK_SEED_RESULTS.filter(p => {
    if (!q) return true;
    return (
      p.title.toLowerCase().includes(q) ||
      p.authors.toLowerCase().includes(q) ||
      p.venue.toLowerCase().includes(q)
    );
  });

  list.innerHTML = "";
  if (filtered.length === 0) {
    const empty = document.createElement("div");
    empty.style.padding = "16px 12px";
    empty.style.fontSize = "11.5px";
    empty.style.color = "var(--tertiary)";
    empty.textContent = "No papers match that query.";
    list.appendChild(empty);
    return;
  }

  for (const p of filtered) {
    const row = document.createElement("div");
    row.className = "seed-item" + (state.selectedSeeds.has(p.id) ? " selected" : "");
    row.dataset.id = p.id;
    row.innerHTML = `
      <div class="seed-title">${escapeHtml(p.title)}</div>
      <div class="seed-meta">
        ${escapeHtml(p.authors)} · <span class="venue">${escapeHtml(p.venue)}</span> · ${p.year} ·
        <span class="cit">${p.citations.toLocaleString()} cit</span>
      </div>
    `;
    row.addEventListener("click", () => {
      if (state.selectedSeeds.has(p.id)) state.selectedSeeds.delete(p.id);
      else state.selectedSeeds.add(p.id);
      renderSeedList();
      renderConfig();
      renderStatus();
    });
    list.appendChild(row);
  }
}

/* ===================== Pipeline SVG render ===================== */
function renderPipeline() {
  const edgesLayer = document.getElementById("edges-layer");
  const nodesLayer = document.getElementById("nodes-layer");
  edgesLayer.innerHTML = "";
  nodesLayer.innerHTML = "";

  /* --- Edges: cubic Bezier curves, Figma-style --- */
  const byId = Object.fromEntries(MOCK_PIPELINE.nodes.map(n => [n.id, n]));
  for (const e of MOCK_PIPELINE.edges) {
    const a = byId[e.from], b = byId[e.to];
    if (!a || !b) continue;
    const s = nodeRightMid(a);
    const t = nodeLeftMid(b);
    const dx = Math.max(40, Math.abs(t.x - s.x) * 0.55);
    const c1x = s.x + dx, c1y = s.y;
    const c2x = t.x - dx, c2y = t.y;
    const d = `M ${s.x} ${s.y} C ${c1x} ${c1y} ${c2x} ${c2y} ${t.x} ${t.y}`;
    const path = document.createElementNS(SVG_NS, "path");
    path.setAttribute("d", d);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", "#c4bcaa");
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("marker-end", "url(#arrow)");
    edgesLayer.appendChild(path);
  }

  /* --- Nodes: rounded rects (parallelogram for seeds, also rounded) --- */
  for (const n of MOCK_PIPELINE.nodes) {
    const g = document.createElementNS(SVG_NS, "g");
    g.classList.add("block");
    g.dataset.id = n.id;

    const isSel = state.selectedBlockId === n.id;
    const colors = BLOCK_COLORS[n.type];
    const fill = DESAT_FILLS[n.type];
    const stroke = colors.stroke;
    const labelColor = colors.stroke;

    let shapeEl;
    if (n.shape === "parallelogram") {
      /* parallelogram approximated with path + rounded corners via stroke-linejoin */
      const skew = 12;
      const rx = 6;
      const x = n.x, y = n.y, w = BLOCK_W, h = BLOCK_H;
      /* Slightly inset path so 1.5px stroke doesn't clip */
      const d = `
        M ${x + skew + rx} ${y}
        L ${x + w - rx} ${y}
        Q ${x + w} ${y} ${x + w - skew} ${y + rx}
        L ${x + w - skew - rx} ${y + h}
        Q ${x + w - skew - rx - 4} ${y + h} ${x + rx} ${y + h}
        Q ${x} ${y + h} ${x + skew - rx + 4} ${y + h - rx}
        L ${x + skew} ${y + rx}
        Q ${x + skew} ${y} ${x + skew + rx} ${y}
        Z`.replace(/\s+/g, " ").trim();
      shapeEl = document.createElementNS(SVG_NS, "path");
      shapeEl.setAttribute("d", d);
      shapeEl.setAttribute("stroke-linejoin", "round");
    } else {
      shapeEl = document.createElementNS(SVG_NS, "rect");
      shapeEl.setAttribute("x", n.x);
      shapeEl.setAttribute("y", n.y);
      shapeEl.setAttribute("width", BLOCK_W);
      shapeEl.setAttribute("height", BLOCK_H);
      shapeEl.setAttribute("rx", 8);
      shapeEl.setAttribute("ry", 8);
    }
    shapeEl.setAttribute("fill", fill);
    shapeEl.setAttribute("stroke", isSel ? "#3e3548" : stroke);
    shapeEl.setAttribute("stroke-width", isSel ? "2" : "1.5");
    if (isSel) shapeEl.setAttribute("filter", "url(#selected-glow)");
    g.appendChild(shapeEl);

    const { cx, cy } = nodeCenter(n);
    const txt = document.createElementNS(SVG_NS, "text");
    txt.setAttribute("class", "block-label");
    txt.setAttribute("x", cx);
    txt.setAttribute("y", cy + 1);
    txt.setAttribute("fill", labelColor);

    /* two-line support */
    const words = n.label.split(" ");
    let line1 = n.label, line2 = "";
    if (words.length >= 2 && n.label.length > 14) {
      const mid = Math.ceil(words.length / 2);
      line1 = words.slice(0, mid).join(" ");
      line2 = words.slice(mid).join(" ");
    }
    if (line2) {
      const t1 = document.createElementNS(SVG_NS, "tspan");
      t1.setAttribute("x", cx); t1.setAttribute("dy", "-0.55em"); t1.textContent = line1;
      const t2 = document.createElementNS(SVG_NS, "tspan");
      t2.setAttribute("x", cx); t2.setAttribute("dy", "1.15em"); t2.textContent = line2;
      txt.appendChild(t1); txt.appendChild(t2);
    } else {
      txt.textContent = line1;
    }
    g.appendChild(txt);

    /* hover thicken */
    g.addEventListener("mouseenter", () => {
      if (state.selectedBlockId !== n.id) {
        shapeEl.setAttribute("stroke-width", "2");
      }
    });
    g.addEventListener("mouseleave", () => {
      if (state.selectedBlockId !== n.id) {
        shapeEl.setAttribute("stroke-width", "1.5");
      }
    });
    g.addEventListener("click", () => {
      state.selectedBlockId = n.id;
      renderPipeline();
      renderConfig();
    });

    nodesLayer.appendChild(g);
  }
}

/* ===================== Config panel render ===================== */
function labelForBlock(id) {
  const n = MOCK_PIPELINE.nodes.find(x => x.id === id);
  return n ? n.label : id;
}

function renderConfig() {
  const header = document.getElementById("config-header");
  const body   = document.getElementById("config-body");
  const id = state.selectedBlockId;
  const cfg = BLOCK_CONFIGS[id] || {};
  header.textContent = "Configuration · " + labelForBlock(id);
  body.innerHTML = "";

  const rows = [];

  if (id === "seeds") {
    rows.push(kvRow("topic",
      `<textarea readonly>${escapeHtml(cfg.topic || "")}</textarea>`));
    rows.push(kvRow("seeds",
      `<span class="kv-mono">${state.selectedSeeds.size} selected</span>`));
    rows.push(kvRow("resolver", `<span class="chip">s2.search_match</span>`));
    rows.push(kvRow("siblings", `<span class="kv-mono">include DOI/ArXiv</span>`));
  } else if (cfg.filters) {
    rows.push(kvRow("name",   `<span class="kv-mono">${escapeHtml(cfg.name)}</span>`));
    rows.push(kvRow("filters", cfg.filters.map(f => `<span class="chip">${escapeHtml(f)}</span>`).join("")));
    rows.push(kvRow("model",  `<span class="kv-mono">${escapeHtml(cfg.model)}</span>`));
    rows.push(kvRow("reasoning", `<span class="chip">${escapeHtml(cfg.reasoning)}</span>`));
    rows.push(kvRow("scope", `<span class="chip">title + abstract</span>`));
  } else if (id === "rerank") {
    rows.push(kvRow("metric", `<span class="chip">${escapeHtml(cfg.metric)}</span>`));
    rows.push(kvRow("k",      `<span class="kv-mono">${cfg.k}</span>`));
    rows.push(kvRow("diversity", `<span class="chip">cluster: ${escapeHtml(cfg.diversity)}</span>`));
    rows.push(kvRow("mode", `<span class="kv-mono">non-destructive · filters signal only</span>`));
  } else if (id === "rescreen") {
    rows.push(kvRow("target",   `<span class="chip">${escapeHtml(cfg.target)}</span>`));
    rows.push(kvRow("screener", `<span class="kv-mono">${escapeHtml(cfg.screener)}</span>`));
    rows.push(kvRow("effect",   `<span class="kv-mono">rejected papers leave ctx.collection</span>`));
  } else {
    rows.push(kvRow("note", `<span class="kv-mono">no configuration</span>`));
  }

  for (const r of rows) body.appendChild(r);
}

function kvRow(key, valHtml) {
  const row = document.createElement("div");
  row.className = "config-row";
  row.innerHTML = `<div class="config-key">${escapeHtml(key)}</div><div class="config-val">${valHtml}</div>`;
  return row;
}

/* ===================== Catalog render ===================== */
function renderCatalog() {
  const root = document.getElementById("catalog");
  root.innerHTML = "";
  for (const [group, items] of Object.entries(BUILDING_BLOCKS_CATALOG)) {
    const sec = document.createElement("div");
    sec.className = "cat-group";
    const h = document.createElement("div");
    h.className = "cat-title";
    h.textContent = group;
    sec.appendChild(h);
    for (const it of items) {
      const chip = document.createElement("div");
      chip.className = "cat-chip";
      chip.innerHTML = `
        <div class="cat-chip-label">${escapeHtml(it.label)}</div>
        <div class="cat-chip-desc">${escapeHtml(it.desc)}</div>
      `;
      chip.addEventListener("click", () => {
        // eslint-disable-next-line no-console
        console.log("[catalog click]", it);
      });
      sec.appendChild(chip);
    }
    root.appendChild(sec);
  }
}

/* ===================== Status bar render ===================== */
function renderStatus() {
  const left = document.getElementById("status-left");
  const blockCount = MOCK_PIPELINE.nodes.length;
  const seedCount = state.selectedSeeds.size;
  const topicSet = (BLOCK_CONFIGS.seeds.topic || "").trim().length > 0;
  left.textContent =
    `${blockCount} blocks · ${topicSet ? "topic set" : "no topic"} · ${seedCount} seeds selected · ready to run`;
}

/* ===================== Utils ===================== */
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/* ===================== Init ===================== */
document.getElementById("seed-search").addEventListener("input", (ev) => {
  state.searchQuery = ev.target.value;
  renderSeedList();
});
document.getElementById("btn-run").addEventListener("click", () => {
  // eslint-disable-next-line no-console
  console.log("[run pipeline] state=", {
    selectedBlockId: state.selectedBlockId,
    selectedSeeds: Array.from(state.selectedSeeds)
  });
});

renderSeedList();
renderPipeline();
renderConfig();
renderCatalog();
renderStatus();
</script>
