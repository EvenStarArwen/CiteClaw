<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CiteClaw — Module A — F5</title>
<script type="importmap">{"imports":{
  "graphology": "https://esm.sh/graphology@0.26",
  "graphology-layout-forceatlas2": "https://esm.sh/graphology-layout-forceatlas2@0.10",
  "graphology-layout-forceatlas2/worker": "https://esm.sh/graphology-layout-forceatlas2@0.10/worker",
  "sigma": "https://esm.sh/sigma@3"
}}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --panel: #faf8f2;
    --panel-soft: #faf7f1;
    --ink: #1e293b;
    --ink-soft: #475569;
    --ink-faint: #94a3b8;
    --rule: #e4e0d4;
    --rule-strong: #cfcabb;
    --hover: #f0ecde;
    --accent: #1a2330;
    --seed: #e63946;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    font-size: 13px;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 48px 1fr;
    grid-template-areas:
      "topbar topbar"
      "sidebar graph";
    height: 100vh;
    width: 100vw;
  }

  /* ---- Topbar ---- */
  header.topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--rule);
  }
  header .brand {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  header .brand .sep { color: var(--ink-faint); margin: 0 7px; font-weight: 400; }
  header .actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  header button {
    background: transparent;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    font: inherit;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 120ms, color 120ms, border-color 120ms;
  }
  header button:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  header button:disabled { opacity: 0.4; cursor: default; }
  header button:disabled:hover { background: transparent; color: var(--ink); border-color: var(--rule-strong); }

  /* ---- Sidebar (list) ---- */
  aside.sidebar {
    grid-area: sidebar;
    background: var(--panel);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .side-header {
    padding: 14px 16px 10px 16px;
    border-bottom: 1px solid var(--rule);
  }
  .side-header .side-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .side-header select {
    width: 100%;
    padding: 6px 8px;
    font: inherit;
    font-size: 12px;
    border: 1px solid var(--rule-strong);
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
  }
  .side-header select:focus { outline: 1px solid var(--accent); outline-offset: -1px; }
  .list {
    flex: 1;
    overflow-y: auto;
  }
  .list-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 80ms;
    border-left: 3px solid transparent;
  }
  .list-item:hover { background: var(--hover); }
  .list-item.active {
    background: var(--hover);
    border-left: 3px solid var(--accent);
  }
  .list-item .li-title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    padding-right: 42px;
  }
  .list-item .li-meta {
    font-size: 11px;
    color: var(--ink-faint);
    position: relative;
  }
  .list-item .li-cits {
    position: absolute;
    right: 0;
    top: 0;
    font-variant-numeric: tabular-nums;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* ---- Graph area ---- */
  main.graph-area {
    grid-area: graph;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }
  #sigma { position: absolute; inset: 0; background: var(--bg); }

  /* ---- Legend ---- */
  .legend {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 5;
    font-size: 10px;
    color: var(--ink);
    pointer-events: none;
    background: rgba(250,248,242,0.92);
    border: 1px solid var(--rule-strong);
    padding: 10px 12px;
    min-width: 200px;
  }
  .legend .block { margin-bottom: 10px; }
  .legend .block:last-child { margin-bottom: 0; }
  .legend .label {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .legend .bar {
    height: 8px;
    width: 180px;
    background: linear-gradient(to right, #adb5bd, #97a0a9, #818b95, #6b7681, #55606d, #414b58, #2d3744, #1a2330);
    border: 1px solid var(--rule-strong);
  }
  .legend .years {
    display: flex;
    justify-content: space-between;
    width: 180px;
    margin-top: 2px;
    font-size: 9px;
    color: var(--ink-faint);
  }
  .legend .sizes {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    padding-top: 2px;
  }
  .legend .size-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .legend .dot {
    border-radius: 50%;
    background: #55606d;
    border: 0.5px solid var(--ink-soft);
    opacity: 0.75;
  }
  .legend .size-label { font-size: 9px; color: var(--ink-faint); }
  .legend .seed-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 2px;
  }
  .legend .seed-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--seed);
  }

  /* ---- Tooltip ---- */
  #tooltip {
    position: absolute;
    pointer-events: none;
    z-index: 8;
    background: var(--panel);
    border: 1px solid var(--rule-strong);
    padding: 6px 9px;
    font-size: 11px;
    color: var(--ink);
    max-width: 280px;
    line-height: 1.35;
    display: none;
    box-shadow: 0 2px 8px rgba(15,23,42,0.08);
  }
  #tooltip .t-cit {
    color: var(--ink-faint);
    font-size: 10px;
    margin-top: 2px;
  }

  /* ---- Detail drawer (slide-in from right, over graph) ---- */
  aside.drawer {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: var(--panel-soft);
    border-left: 1px solid var(--rule);
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(.3,.0,.2,1);
    z-index: 10;
    padding: 26px 26px 26px 26px;
    overflow-y: auto;
    color: var(--ink);
    box-shadow: -4px 0 16px rgba(15,23,42,0.06);
  }
  aside.drawer.open { transform: translateX(0); }
  aside.drawer .close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    cursor: pointer;
    font: inherit;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  aside.drawer .close:hover { color: var(--ink); }
  aside.drawer h2 {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    margin: 0 0 12px 0;
    letter-spacing: -0.01em;
    padding-right: 36px;
  }
  aside.drawer .meta {
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.6;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
    margin-bottom: 14px;
  }
  aside.drawer .meta strong { color: var(--ink); font-weight: 500; }
  aside.drawer .row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  aside.drawer .abstract {
    font-size: 12px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  aside.drawer .tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--rule-strong);
    padding: 2px 7px;
    margin-top: 14px;
    color: var(--ink-soft);
  }
  aside.drawer .tag.seed {
    border-color: var(--seed);
    color: var(--seed);
    margin-left: 6px;
  }
</style>
</head>

<div class="app">
  <header class="topbar">
    <div class="brand">CiteClaw<span class="sep">·</span>Module A<span class="sep">·</span>F5</div>
    <div class="actions">
      <button id="btn-grow">Simulate live growth</button>
      <button id="btn-reset">Reset</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="side-header">
      <div class="side-title" id="side-title">Papers (0)</div>
      <select id="sort-select">
        <option value="citations">Sort by: Citations</option>
        <option value="year">Sort by: Year</option>
        <option value="title">Sort by: Title</option>
      </select>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="graph-area">
    <div id="sigma"></div>

    <div class="legend">
      <div class="block">
        <div class="label">Year</div>
        <div class="bar"></div>
        <div class="years"><span>2018</span><span>2025</span></div>
      </div>
      <div class="block">
        <div class="label">Citations</div>
        <div class="sizes">
          <div class="size-item"><div class="dot" style="width:6px;height:6px"></div><div class="size-label">10</div></div>
          <div class="size-item"><div class="dot" style="width:14px;height:14px"></div><div class="size-label">200</div></div>
          <div class="size-item"><div class="dot" style="width:30px;height:30px"></div><div class="size-label">5000</div></div>
        </div>
      </div>
      <div class="block">
        <div class="label">Seed</div>
        <div class="seed-row"><span class="seed-dot"></span><span class="size-label">accent</span></div>
      </div>
    </div>

    <div id="tooltip"></div>

    <aside class="drawer" id="drawer">
      <button class="close" id="drawer-close">close</button>
      <h2 id="d-title"></h2>
      <div class="meta">
        <div id="d-authors"></div>
        <div class="row"><span id="d-year"></span><span id="d-venue"></span></div>
        <div id="d-cits"></div>
      </div>
      <div class="abstract" id="d-abstract"></div>
      <div>
        <span class="tag" id="d-cluster"></span>
        <span class="tag seed" id="d-seed" style="display:none">Seed</span>
      </div>
    </aside>
  </main>
</div>

<script type="module">
import Graph from 'graphology';
import Sigma from 'sigma';
import FA2Layout from 'graphology-layout-forceatlas2/worker';

// ---------- palette ----------
const YEAR_COLORS = {
  2018: "#adb5bd",
  2019: "#97a0a9",
  2020: "#818b95",
  2021: "#6b7681",
  2022: "#55606d",
  2023: "#414b58",
  2024: "#2d3744",
  2025: "#1a2330"
};
const SEED_COLOR = "#e63946";
const yearColor = (y) => YEAR_COLORS[y] || "#6b7681";
const nodeRadius = (c) => 2 + 28 * (Math.log1p(c) / Math.log1p(10000));
const nodeColor = (p) => p.seed ? SEED_COLOR : yearColor(p.year);

// ---------- mock data (~80 papers, 4 clusters, 3 seeds) ----------
const PAPERS = [
  // Protein structure
  {id:'p01', title:'Highly Accurate Protein Structure Prediction with AlphaFold', authors:['Jumper','Evans','Pritzel','Hassabis'], year:2021, venue:'Nature', citations:7800, abstract:'We present AlphaFold, an attention-based neural network that predicts protein three-dimensional structures from amino acid sequences with near-experimental accuracy across a broad range of targets.', cluster:'Protein structure', seed:true},
  {id:'p02', title:'Improved Protein Structure Prediction Using Potentials from Deep Learning', authors:['Senior','Evans','Jumper'], year:2020, venue:'Nature', citations:3800, abstract:'AlphaFold 1 uses deep residual networks over pairwise distance histograms to predict protein backbone geometry, setting a new state of the art on CASP13.', cluster:'Protein structure'},
  {id:'p03', title:'Accurate Prediction of Protein Structures and Interactions Using a Three-Track Network', authors:['Baek','DiMaio','Baker'], year:2021, venue:'Science', citations:2900, abstract:'RoseTTAFold introduces a three-track architecture coupling one-dimensional, two-dimensional, and three-dimensional reasoning for efficient protein structure prediction.', cluster:'Protein structure'},
  {id:'p04', title:'Evolutionary-Scale Prediction of Atomic-Level Protein Structure (ESM-2, ESMFold)', authors:['Lin','Akin','Rao','Rives'], year:2023, venue:'Science', citations:1700, abstract:'ESMFold uses a 15B-parameter protein language model to fold sequences directly without multiple sequence alignments, enabling single-sequence structure prediction at scale.', cluster:'Protein structure'},
  {id:'p05', title:'ColabFold: Making Protein Folding Accessible to All', authors:['Mirdita','Schuetze','Ovchinnikov','Steinegger'], year:2022, venue:'Nature Methods', citations:2100, abstract:'ColabFold combines the MMseqs2 search pipeline with AlphaFold and RoseTTAFold inference for faster folding with minimal resources.', cluster:'Protein structure'},
  {id:'p06', title:'OmegaFold: High-Resolution Single-Sequence Structure Prediction', authors:['Wu','Fang','Liu'], year:2022, venue:'bioRxiv', citations:420, abstract:'OmegaFold predicts atomic coordinates directly from a single primary sequence without MSAs, recovering much of the accuracy of alignment-based methods.', cluster:'Protein structure'},
  {id:'p07', title:'ProtBERT: Transformer Language Models for Protein Sequences', authors:['Elnaggar','Heinzinger','Rost'], year:2021, venue:'IEEE TPAMI', citations:980, abstract:'ProtBERT adapts BERT-style masked language modeling to protein sequences, yielding representations that transfer to downstream biology tasks.', cluster:'Protein structure'},
  {id:'p08', title:'Language Models of Protein Sequences at the Scale of Evolution (ESM-1b)', authors:['Rives','Meier','Sercu','Fergus'], year:2021, venue:'PNAS', citations:2600, abstract:'ESM-1b learns from 250M protein sequences and captures structural and functional information without supervision.', cluster:'Protein structure'},
  {id:'p09', title:'ProteinMPNN: Robust Deep Learning Based Protein Sequence Design', authors:['Dauparas','Anishchenko','Baker'], year:2022, venue:'Science', citations:1100, abstract:'ProteinMPNN is a message-passing neural network for inverse folding that generates diverse, functional sequences for a given backbone.', cluster:'Protein structure'},
  {id:'p10', title:'RFdiffusion: De Novo Design of Protein Structure and Function', authors:['Watson','Juergens','Baker'], year:2023, venue:'Nature', citations:920, abstract:'RFdiffusion adapts denoising diffusion to RoseTTAFold backbones, enabling unconditional and conditional de novo protein design.', cluster:'Protein structure'},
  {id:'p11', title:'AlphaFold-Multimer: Predicting Protein Complexes', authors:['Evans','ONeill','Jumper'], year:2022, venue:'bioRxiv', citations:1400, abstract:'AlphaFold-Multimer extends AlphaFold 2 to heteromeric complexes with targeted training and interface-aware losses.', cluster:'Protein structure'},
  {id:'p12', title:'Accurate Structure Prediction of Biomolecular Interactions with AlphaFold 3', authors:['Abramson','Adler','Jumper','Hassabis'], year:2024, venue:'Nature', citations:540, abstract:'AlphaFold 3 unifies protein, nucleic acid, ligand, and ion prediction through a diffusion-based generative decoder over biomolecular structure.', cluster:'Protein structure', seed:true},
  {id:'p13', title:'ProtTrans: Towards Cracking the Language of Life', authors:['Elnaggar','Heinzinger','Dallago','Rost'], year:2022, venue:'IEEE TPAMI', citations:820, abstract:'ProtTrans benchmarks six large protein language models and shows scaling benefits for per-residue prediction tasks.', cluster:'Protein structure'},
  {id:'p14', title:'UniRep: Unified Rational Protein Engineering with Sequence Representations', authors:['Alley','Khimulya','Church'], year:2019, venue:'Nature Methods', citations:730, abstract:'UniRep trains an mLSTM on UniRef to provide sequence embeddings that improve protein engineering workflows.', cluster:'Protein structure'},
  {id:'p15', title:'Chai-1: Decoding the Molecular Interactions of Life', authors:['Chai Team'], year:2024, venue:'bioRxiv', citations:180, abstract:'Chai-1 is a multimodal biomolecular foundation model capable of joint structure prediction across proteins, DNA, RNA, and small molecules.', cluster:'Protein structure'},
  {id:'p16', title:'Boltz-1: Democratizing Biomolecular Interaction Modeling', authors:['Wohlwend','Ringel','Barzilay'], year:2024, venue:'bioRxiv', citations:140, abstract:'Boltz-1 is an open-source reproduction of AlphaFold 3 trained on public structural data with competitive interaction accuracy.', cluster:'Protein structure'},
  {id:'p17', title:'Transformer Protein Language Models for Variant Effect Prediction', authors:['Meier','Rao','Rives'], year:2021, venue:'NeurIPS', citations:640, abstract:'Protein language models produce zero-shot variant effect scores correlating with deep mutational scanning experiments.', cluster:'Protein structure'},
  {id:'p18', title:'MSA Transformer', authors:['Rao','Liu','Sercu','Rives'], year:2021, venue:'ICML', citations:720, abstract:'MSA Transformer applies row- and column-wise attention to multiple sequence alignments for self-supervised protein modeling.', cluster:'Protein structure'},
  {id:'p19', title:'Deep Learning-Based Protein Function Prediction', authors:['Gligorijevic','Barot','Bonneau'], year:2021, venue:'Nature Comm.', citations:480, abstract:'A graph convolutional model predicts Gene Ontology terms from structure, augmenting sequence-only baselines.', cluster:'Protein structure'},
  {id:'p20', title:'Structure-Based Protein Function Prediction Using GCNs', authors:['Gligorijevic','Renfrew','Bonneau'], year:2020, venue:'Nature Comm.', citations:560, abstract:'DeepFRI applies graph convolutional networks to contact maps for hierarchical functional annotation of protein structures.', cluster:'Protein structure'},

  // Diffusion models
  {id:'d01', title:'Denoising Diffusion Probabilistic Models', authors:['Ho','Jain','Abbeel'], year:2020, venue:'NeurIPS', citations:6800, abstract:'DDPM introduces a simple denoising objective that enables high-fidelity image synthesis via reverse diffusion sampling.', cluster:'Diffusion', seed:true},

  {id:'d05', title:'Hierarchical Text-Conditional Image Generation with CLIP Latents (DALL-E 2)', authors:['Ramesh','Dhariwal','Chen','Nichol'], year:2022, venue:'arXiv', citations:3100, abstract:'DALL-E 2 uses a CLIP-based prior and a diffusion decoder to synthesize images aligned to textual captions.', cluster:'Diffusion'},
  {id:'d06', title:'Consistency Models', authors:['Song','Dhariwal','Sutskever'], year:2023, venue:'ICML', citations:980, abstract:'Consistency models enable one-step high-quality generation by enforcing self-consistency along diffusion trajectories.', cluster:'Diffusion'},
  {id:'d07', title:'Flow Matching for Generative Modeling', authors:['Lipman','Chen','Le'], year:2023, venue:'ICLR', citations:820, abstract:'Flow matching generalizes diffusion by directly regressing conditional vector fields defining continuous normalizing flows.', cluster:'Diffusion'},

  {id:'d11', title:'ControlNet: Adding Conditional Control to Text-to-Image Diffusion', authors:['Zhang','Rao','Agrawala'], year:2023, venue:'ICCV', citations:2100, abstract:'ControlNet augments pretrained diffusion models with trainable side branches for spatial conditioning inputs.', cluster:'Diffusion'},

  {id:'d14', title:'Elucidating the Design Space of Diffusion-Based Models', authors:['Karras','Aittala','Laine','Aila'], year:2022, venue:'NeurIPS', citations:2300, abstract:'This paper decouples the design choices behind diffusion models, giving a principled recipe for training and sampling.', cluster:'Diffusion'},
  {id:'d15', title:'DiT: Scalable Diffusion Models with Transformers', authors:['Peebles','Xie'], year:2023, venue:'ICCV', citations:870, abstract:'Diffusion transformers replace UNets with plain transformer backbones, scaling cleanly to class-conditional ImageNet generation.', cluster:'Diffusion'},
  {id:'d16', title:'Progressive Distillation for Fast Sampling of Diffusion Models', authors:['Salimans','Ho'], year:2022, venue:'ICLR', citations:1100, abstract:'Progressive distillation halves sampling steps iteratively while preserving perceptual quality for fast diffusion inference.', cluster:'Diffusion'},
  {id:'d17', title:'Improved Denoising Diffusion Probabilistic Models', authors:['Nichol','Dhariwal'], year:2021, venue:'ICML', citations:2000, abstract:'Improved-DDPM learns variances and uses cosine noise schedules to boost log-likelihood and sample quality.', cluster:'Diffusion'},
  {id:'d18', title:'Muse: Text-to-Image Generation via Masked Generative Transformers', authors:['Chang','Zhang','Jampani'], year:2023, venue:'ICML', citations:420, abstract:'Muse uses parallel masked token prediction instead of autoregressive or diffusion decoding for efficient text-to-image generation.', cluster:'Diffusion'},
  {id:'d19', title:'Stable Video Diffusion', authors:['Blattmann','Dockhorn','Rombach'], year:2024, venue:'arXiv', citations:380, abstract:'Stable Video Diffusion curates a large video pretraining dataset and fine-tunes for high-resolution video generation.', cluster:'Diffusion'},
  {id:'d20', title:'Rectified Flow: A Marginal-Preserving Approach to Generative Modeling', authors:['Liu','Gong','Liu'], year:2023, venue:'ICLR', citations:560, abstract:'Rectified flow learns straight-line ODE paths between noise and data distributions, improving sampling efficiency.', cluster:'Diffusion'},

  // NLP transformers
  {id:'n01', title:'BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding', authors:['Devlin','Chang','Lee','Toutanova'], year:2018, venue:'NAACL', citations:7900, abstract:'BERT pretrains bidirectional transformers with masked language modeling and next-sentence prediction, setting new benchmarks across NLU tasks.', cluster:'NLP'},

// ---------- deterministic edges ----------
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const EDGES = (() => {
  const rand = mulberry32(42);
  const byCluster = {};
  for (const p of PAPERS) (byCluster[p.cluster] ||= []).push(p);
  const edges = [];
  const seen = new Set();
  const add = (a, b, w) => {
    if (a === b) return;
    const k = a < b ? a + '|' + b : b + '|' + a;
    if (seen.has(k)) return;
    seen.add(k);
    edges.push({ source: a, target: b, weight: w });
  };
  for (const cluster of Object.values(byCluster)) {
    for (let i = 0; i < cluster.length; i++) {
      const nEdges = 2 + Math.floor(rand() * 3);
      for (let k = 0; k < nEdges; k++) {
        const j = Math.floor(rand() * cluster.length);
        add(cluster[i].id, cluster[j].id, 0.4 + rand() * 0.6);
      }
    }
  }
  const all = PAPERS.map(p => p.id);
  const crossCount = Math.floor(edges.length * 0.65);
  for (let i = 0; i < crossCount; i++) {
    const a = all[Math.floor(rand() * all.length)];
    const b = all[Math.floor(rand() * all.length)];
    add(a, b, 0.2 + rand() * 0.5);
  }
  return edges;
})();

const PAPER_BY_ID = Object.fromEntries(PAPERS.map(p => [p.id, p]));

// ---------- graph ----------
const graph = new Graph({ multi: false, type: 'undirected' });
const rand = mulberry32(7);

function pickExistingNeighborFor(p) {
  const candidates = [];
  for (const e of EDGES) {
    if (e.source === p.id && graph.hasNode(e.target)) candidates.push(e.target);
    else if (e.target === p.id && graph.hasNode(e.source)) candidates.push(e.source);
  }
  if (candidates.length) return candidates[Math.floor(rand() * candidates.length)];
  const nodes = graph.nodes();
  return nodes.length ? nodes[Math.floor(rand() * nodes.length)] : null;
}

function addPaperNode(p) {
  if (graph.hasNode(p.id)) return;
  const neighborId = graph.order > 0 ? pickExistingNeighborFor(p) : null;
  let x, y;
  if (neighborId) {
    const nx = graph.getNodeAttribute(neighborId, 'x');
    const ny = graph.getNodeAttribute(neighborId, 'y');
    x = nx + (rand() - 0.5) * 10;
    y = ny + (rand() - 0.5) * 10;
  } else {
    x = (rand() - 0.5) * 20;
    y = (rand() - 0.5) * 20;
  }
  const target = nodeRadius(p.citations);
  graph.addNode(p.id, {
    label: p.title.length > 48 ? p.title.slice(0, 46) + '…' : p.title,
    x, y,
    size: 0.001,
    _targetSize: target,
    _animStart: performance.now(),
    _animSize: 0.001,
    color: nodeColor(p),
    labelSize: 11,
    labelColor: '#000000',
    forceLabel: false,
  });
}

function addEdgesFor(id) {
  for (const e of EDGES) {
    if ((e.source === id || e.target === id)
        && graph.hasNode(e.source) && graph.hasNode(e.target)
        && !graph.hasEdge(e.source, e.target)) {
      graph.addEdge(e.source, e.target, {
        weight: e.weight,
        size: e.weight * 2.5 + 0.5,
        color: graph.getNodeAttribute(e.target, 'color'),
      });
    }
  }
}

// initial seed of ~30 nodes (all seeds + top citations per cluster)
const INITIAL_IDS = (() => {
  const sorted = [...PAPERS].sort((a, b) => b.citations - a.citations);
  const initial = new Set(PAPERS.filter(p => p.seed).map(p => p.id));
  const perCluster = {};
  for (const p of sorted) {
    perCluster[p.cluster] = (perCluster[p.cluster] || 0);
    if (initial.size >= 30) break;
    if (perCluster[p.cluster] < 8) {
      initial.add(p.id);
      perCluster[p.cluster]++;
    }
  }
  return [...initial];
})();

for (const id of INITIAL_IDS) addPaperNode(PAPER_BY_ID[id]);
for (const id of INITIAL_IDS) addEdgesFor(id);
// finalize initial sizes (no load animation)
graph.forEachNode((id, attrs) => {
  graph.setNodeAttribute(id, 'size', attrs._targetSize);
  graph.setNodeAttribute(id, '_animSize', attrs._targetSize);
});

// top-3 by citation get forceLabel
const top3 = [...PAPERS].sort((a, b) => b.citations - a.citations).slice(0, 3).map(p => p.id);

// ---------- state (MUST precede new Sigma — reducers run synchronously in constructor) ----------
const state = {
  selected: null,
  growing: false,
  sortBy: 'citations',
  visibleIds: new Set(INITIAL_IDS),
};

// ---------- sigma ----------
const container = document.getElementById('sigma');
const sigmaInstance = new Sigma(graph, container, {
  labelRenderedSizeThreshold: 8,
  labelColor: { color: '#000000' },
  labelFont: 'Inter, -apple-system, sans-serif',
  labelSize: 11,
  labelWeight: '400',
  defaultEdgeColor: '#818b95',
  defaultNodeColor: '#6b7681',
  minCameraRatio: 0.05,
  maxCameraRatio: 8,
  edgeReducer: (edge, data) => {
    const target = graph.target(edge);
    const source = graph.source(edge);
    const base = { ...data, color: graph.getNodeAttribute(target, 'color'), size: data.size };
    if (state.selected) {
      const touches = source === state.selected || target === state.selected;
      if (!touches) {
        return { ...base, color: '#d8d4c6', size: data.size * 0.6, hidden: false };
      }
      return base;
    }
    return base;
  },
  nodeReducer: (id, data) => {
    const animated = data._animSize ?? data.size;
    const base = {
      ...data,
      size: animated,
      forceLabel: top3.includes(id) || data.forceLabel,
    };
    if (state.selected) {
      if (id === state.selected) {
        return { ...base, zIndex: 2, forceLabel: true };
      }
      return { ...base, color: fade(data.color, 0.15), labelColor: '#c9c3b3' };
    }
    return base;
  },
});

function fade(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  const br = 245, bg = 243, bb = 238;
  const rr = Math.round(r * alpha + br * (1 - alpha));
  const gg = Math.round(g * alpha + bg * (1 - alpha));
  const bbb = Math.round(b * alpha + bb * (1 - alpha));
  return '#' + [rr, gg, bbb].map(v => v.toString(16).padStart(2, '0')).join('');
}

// ---------- FA2 ----------
const layout = new FA2Layout(graph, {
  settings: {
    linLogMode: true,
    adjustSizes: true,
    barnesHutOptimize: true,
    scalingRatio: 10,
    gravity: 1,
    slowDown: 10,
    edgeWeightInfluence: 1,
  },
});
layout.start();

// ---------- grow animation RAF ----------
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function tick() {
  const now = performance.now();
  let dirty = false;
  graph.forEachNode((id, attrs) => {
    if (attrs._targetSize !== attrs._animSize) {
      const dur = 400;
      const t = Math.min(1, (now - attrs._animStart) / dur);
      const v = easeOutCubic(t) * attrs._targetSize;
      graph.setNodeAttribute(id, '_animSize', v);
      graph.setNodeAttribute(id, 'size', v);
      if (t >= 1) {
        graph.setNodeAttribute(id, '_animSize', attrs._targetSize);
        graph.setNodeAttribute(id, 'size', attrs._targetSize);
      }
      dirty = true;
    }
  });
  if (dirty) sigmaInstance.refresh();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---------- sidebar list ----------
const listEl = document.getElementById('list');
const sideTitleEl = document.getElementById('side-title');
const sortSelect = document.getElementById('sort-select');

function formatCits(c) {
  if (c >= 1000) return (c / 1000).toFixed(1) + 'k';
  return String(c);
}
function escape(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function renderList() {
  const visible = PAPERS.filter(p => state.visibleIds.has(p.id));
  const sorted = [...visible].sort((a, b) => {
    if (state.sortBy === 'citations') return b.citations - a.citations;
    if (state.sortBy === 'year') return b.year - a.year;
    if (state.sortBy === 'title') return a.title.localeCompare(b.title);
    return 0;
  });
  sideTitleEl.textContent = 'Papers (' + visible.length + ')';
  listEl.innerHTML = '';
  for (const p of sorted) {
    const row = document.createElement('div');
    row.className = 'list-item' + (state.selected === p.id ? ' active' : '');
    row.dataset.id = p.id;
    const author = p.authors[0] || '';
    row.innerHTML =
      '<div class="li-title">' + escape(p.title) + '</div>' +
      '<div class="li-meta">' +
        escape(author) + ' · ' + p.year +
        '<span class="li-cits">' + formatCits(p.citations) + '</span>' +
      '</div>';
    row.addEventListener('click', () => selectPaper(p.id));
    listEl.appendChild(row);
  }
}

sortSelect.addEventListener('change', () => {
  state.sortBy = sortSelect.value;
  renderList();
});

// ---------- drawer ----------
const drawer = document.getElementById('drawer');
const tooltip = document.getElementById('tooltip');

function showDetail(id) {
  const p = PAPER_BY_ID[id];
  if (!p) return;
  document.getElementById('d-title').textContent = p.title;
  const authors = p.authors.slice(0, 3).join(', ') + (p.authors.length > 3 ? ', et al.' : '');
  document.getElementById('d-authors').innerHTML = '<strong>' + escape(authors) + '</strong>';
  document.getElementById('d-year').textContent = p.year;
  document.getElementById('d-venue').textContent = p.venue;
  document.getElementById('d-cits').textContent = p.citations.toLocaleString() + ' citations';
  const abs = p.abstract.length > 200 ? p.abstract.slice(0, 200).trim() + '…' : p.abstract;
  document.getElementById('d-abstract').textContent = abs;
  document.getElementById('d-cluster').textContent = p.cluster;
  document.getElementById('d-seed').style.display = p.seed ? 'inline-block' : 'none';
  drawer.classList.add('open');
}

function selectPaper(id) {
  state.selected = id;
  showDetail(id);
  renderList();
  sigmaInstance.refresh();
}

function clearSelection() {
  state.selected = null;
  drawer.classList.remove('open');
  renderList();
  sigmaInstance.refresh();
}

document.getElementById('drawer-close').addEventListener('click', clearSelection);

// ---------- sigma events ----------
sigmaInstance.on('clickNode', ({ node }) => selectPaper(node));
sigmaInstance.on('clickStage', () => {
  if (state.selected) clearSelection();
});

sigmaInstance.on('enterNode', ({ node, event }) => {
  const p = PAPER_BY_ID[node];
  if (!p) return;
  tooltip.innerHTML = '<div>' + escape(p.title) + '</div><div class="t-cit">' + p.citations.toLocaleString() + ' citations</div>';
  tooltip.style.display = 'block';
  moveTooltip(event);
});
sigmaInstance.on('leaveNode', () => { tooltip.style.display = 'none'; });
sigmaInstance.getMouseCaptor().on('mousemovebody', (e) => {
  if (tooltip.style.display === 'block') moveTooltip(e);
});
function moveTooltip(event) {
  const rect = container.getBoundingClientRect();
  const ev = event.original || event;
  const cx = (ev.clientX ?? ev.x ?? 0) - rect.left;
  const cy = (ev.clientY ?? ev.y ?? 0) - rect.top;
  tooltip.style.left = (cx + 12) + 'px';
  tooltip.style.top = (cy + 12) + 'px';
}

// ---------- buttons ----------
const btnGrow = document.getElementById('btn-grow');
const btnReset = document.getElementById('btn-reset');

btnGrow.addEventListener('click', () => {
  if (state.growing) return;
  state.growing = true;
  btnGrow.disabled = true;
  const remaining = PAPERS.filter(p => !graph.hasNode(p.id));
  let i = 0;
  const step = () => {
    if (i >= remaining.length) {
      state.growing = false;
      return;
    }
    const p = remaining[i++];
    addPaperNode(p);
    addEdgesFor(p.id);
    state.visibleIds.add(p.id);
    renderList();
    setTimeout(step, 150);
  };
  step();
});

btnReset.addEventListener('click', () => {
  if (state.growing) return;
  state.selected = null;
  drawer.classList.remove('open');
  layout.stop();
  graph.clear();
  for (const id of INITIAL_IDS) addPaperNode(PAPER_BY_ID[id]);
  for (const id of INITIAL_IDS) addEdgesFor(id);
  graph.forEachNode((id, attrs) => {
    graph.setNodeAttribute(id, 'size', attrs._targetSize);
    graph.setNodeAttribute(id, '_animSize', attrs._targetSize);
  });
  state.visibleIds = new Set(INITIAL_IDS);
  layout.start();
  btnGrow.disabled = false;
  renderList();
  sigmaInstance.refresh();
});

// ---------- initial render ----------
renderList();

window.addEventListener('beforeunload', () => { layout.kill(); sigmaInstance.kill(); });
</script>
